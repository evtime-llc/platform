<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EVTime — Listing</title>
  <!-- Keep your existing theme / colors. This file only adjusts CTAs + drawer copy. -->
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Minimal safety styles in case some classes are missing; respect existing theme. */
    body { margin:0; }
    .page { max-width: 1200px; margin: 0 auto; padding: 12px; }
    .hero { position: relative; background: #000; border: 2px solid #a06b3b; border-radius: 12px; overflow: hidden; }
    .hero-stage { aspect-ratio: 16/9; display:flex; align-items:center; justify-content:center; background:#000; }
    .hero-stage img { max-height: 100%; max-width: 100%; object-fit: contain; display:block; }
    .hero-nav { position:absolute; top:50%; transform: translateY(-50%); width:100%; display:flex; justify-content:space-between; pointer-events:none; }
    .hero-nav button { pointer-events:auto; background: rgba(0,0,0,.55); color:#fff; border:1px solid #a06b3b; padding:10px 14px; border-radius:999px; cursor:pointer; }
    .dots { display:flex; gap:6px; justify-content:center; padding:10px 0; }
    .dot { width:8px; height:8px; border-radius:50%; background:#666; border:1px solid #a06b3b; }
    .dot.active { background:#a06b3b; }

    /* Bottom fixed bar with two buttons */
    .bottom-bar { position: fixed; left:0; right:0; bottom:0; z-index: 50; background: #3a2617; border-top: 1px solid #a06b3b; box-shadow: 0 -4px 12px rgba(0,0,0,.25); }
    .bottom-inner { max-width: 1200px; margin:0 auto; display:flex; gap:10px; padding:10px 12px; }
    .btn { appearance:none; border:1px solid #a06b3b; background:#5a3a22; color:#fff; padding:12px 16px; border-radius:10px; font-size:16px; cursor:pointer; }
    .btn.primary { background:#a06b3b; color:#111; font-weight:600; }
    .btn:focus { outline:2px solid #a06b3b; outline-offset:2px; }
    @media (max-width: 640px){ .bottom-inner { flex-direction:column; } }

    /* Drawer */
    .drawer { position: fixed; top:0; right:0; bottom:0; width: min(420px, 100%); background:#1a120d; border-left:1px solid #a06b3b; transform: translateX(100%); transition: transform .25s ease; z-index: 60; display:flex; flex-direction:column; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #a06b3b; color:#fff; }
    .drawer-title { font-size:18px; font-weight:600; }
    .drawer-close { background:transparent; border:1px solid #a06b3b; color:#fff; padding:6px 10px; border-radius:8px; cursor:pointer; }
    .drawer-body { padding:16px; overflow:auto; color:#eee; }
    .section { margin-bottom:22px; }
    .section h3 { margin:0 0 10px; font-size:16px; color:#fff; }
    .contact-buttons { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
    .contact-buttons a, .contact-buttons button { text-decoration:none; }
    .copy-links { font-size:14px; color:#cfcfcf; }
    .copy-links button { background:#2a1b12; color:#fff; border:1px solid #a06b3b; padding:6px 10px; border-radius:8px; cursor:pointer; }
    .form { display:grid; gap:10px; }
    .form input, .form textarea, .form label { font-size:15px; }
    .form input, .form textarea { background:#2a1b12; color:#fff; border:1px solid #a06b3b; border-radius:8px; padding:10px; }
    .form .row { display:grid; gap:10px; grid-template-columns: 1fr 1fr; }
    @media (max-width:640px){ .form .row { grid-template-columns: 1fr; } }
    .helper { font-size:12px; color:#cfcfcf; }

    /* Under-photos CTA row (for immediate visibility under carousel/ads) */
    .above-bottom-cta { display:flex; gap:10px; margin:14px 0 70px; } /* leave space for fixed bar */
    @media (max-width:640px){ .above-bottom-cta { flex-direction:column; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <!-- Keep your existing header/branding -->
    </header>

    <main>
      <section class="hero" id="hero">
        <div class="hero-stage" id="heroStage"><!-- images injected --></div>
        <div class="hero-nav">
          <button id="prevImg" aria-label="Previous image">‹</button>
          <button id="nextImg" aria-label="Next image">›</button>
        </div>
        <div class="dots" id="dots"></div>
      </section>

      <!-- Simple spec/title area (optional: your real spec block renders elsewhere) -->
      <section id="specs" style="padding:12px 2px; color:#eee"></section>

      <!-- CTAs directly under photos/ads -->
      <div class="above-bottom-cta">
        <button class="btn primary" id="ctaAdvisorTop">Contact an Advisor</button>
        <button class="btn" id="ctaBackTop">Back</button>
      </div>

      <!-- Your ads / details content continues here... -->
      <section id="details"><!-- keep your existing details layout --></section>
    </main>
  </div>

  <!-- Fixed bottom bar with the same two buttons (always visible) -->
  <div class="bottom-bar" role="region" aria-label="Listing actions">
    <div class="bottom-inner">
      <button class="btn primary" id="ctaAdvisorBottom">Contact an Advisor</button>
      <button class="btn" id="ctaBackBottom">Back</button>
    </div>
  </div>

  <!-- Drawer: unified Concierge -->
  <aside class="drawer" id="advisorDrawer" aria-hidden="true" data-drawer>
    <div class="drawer-header">
      <div class="drawer-title">EVTime Concierge</div>
      <button class="drawer-close" id="drawerClose" data-drawer-close>Close</button>
    </div>
    <div class="drawer-body">
      <div class="section">
        <h3>Quick Contact</h3>
        <div class="contact-buttons" id="quickContact"><!-- injected with phone/email --></div>
        <div class="copy-links">
          <button id="copyEmail">Copy email</button> • <button id="copyMsg">Copy message</button>
        </div>
      </div>
      <div class="section">
        <h3>Request Information</h3>
        <form id="advisorForm" class="form">
          <div class="row">
            <input id="fName" name="name" placeholder="Full name" required />
            <input id="fPhone" name="phone" placeholder="Phone" />
          </div>
          <input id="fEmail" name="email" type="email" placeholder="Email" required />
          <textarea id="fMsg" name="message" rows="5" placeholder="Your message"></textarea>
          <label><input type="checkbox" id="fFinance" /> I’m interested in financing</label>
          <div class="helper">Submitting will notify EVTime instantly. We’ll reach out promptly.</div>
          <button class="btn primary" type="submit">Send to Concierge</button>
        </form>
      </div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // --- Config ---
    const PHONE_PUBLIC = "+1 424-425-6211";
    const EMAIL_PUBLIC = "welcome.evtime@gmail.com";

    const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Helpers
    const qs = (sel, root=document) => root.querySelector(sel);
    const qsa = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    function getParam(name){ return new URLSearchParams(location.search).get(name); }

    function normalizeImagePath(p, id){
      if (!p) return null;
      if (/^https?:\/\//i.test(p)) return p; // already a URL
      let key = p.replace(/^images\//,'').replace(/^images\//,''); // strip legacy prefixes twice if needed
      // If the path doesn't start with the id folder, assume key is already correct
      if (!/^\w{8}-/i.test(key) && id) {
        // Old style just filename -> place inside id
        key = `${id}/${key}`;
      }
      return `${window.SUPABASE_URL}/storage/v1/object/public/images/${key}`;
    }

    function smsEncode(s){ return encodeURIComponent(s); }

    // Carousel
    let imgs = [];
    let idx = 0;
    function renderCarousel(){
      const stage = qs('#heroStage');
      stage.innerHTML = '';
      const img = document.createElement('img');
      img.alt = 'Vehicle photo';
      img.src = imgs[idx] || '';
      stage.appendChild(img);
      const dots = qs('#dots');
      dots.innerHTML='';
      imgs.forEach((_,i)=>{
        const d = document.createElement('div');
        d.className = 'dot' + (i===idx ? ' active' : '');
        d.addEventListener('click', ()=>{ idx = i; renderCarousel(); });
        dots.appendChild(d);
      });
    }

    function nextImg(){ if (!imgs.length) return; idx = (idx+1) % imgs.length; renderCarousel(); }
    function prevImg(){ if (!imgs.length) return; idx = (idx-1+imgs.length) % imgs.length; renderCarousel(); }

    qs('#nextImg').addEventListener('click', nextImg);
    qs('#prevImg').addEventListener('click', prevImg);

    // Drawer controls
    const drawer = qs('#advisorDrawer');
    function openDrawer(){ drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false'); }
    function closeDrawer(){ drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); }
    window.closeDrawer = closeDrawer;

    qsa('#ctaAdvisorTop, #ctaAdvisorBottom').forEach(el=> el.addEventListener('click', openDrawer));
    qsa('#ctaBackTop, #ctaBackBottom, #drawerClose').forEach(el=> el.addEventListener('click', ()=>{
      const isOpen = drawer.classList.contains('open');
      if (isOpen) { closeDrawer(); return; }
      if (history.length > 1) history.back(); else location.href = 'share.html';
    }));

    // Quick Contact injection (with Gmail web compose + fallback copy)
    function setQuickContact(phone, email, mailSub, mailBody){
      const c = qs('#quickContact');
      const smsBody = smsEncode(mailBody);
      c.innerHTML = `
        <a class="btn" href="tel:${phone}">Call Now</a>
        <a class="btn" href="sms:${phone}?body=${smsBody}">Text Now</a>
        <a class="btn" href="https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${encodeURIComponent(mailSub)}" target="_blank" onclick="if(!window.location.hostname.includes('mail.google.com')){navigator.clipboard.writeText('${email}'); alert('Email address copied!');}">Email Concierge</a>
      `;
      // Copy shortcuts
      qs('#copyEmail').onclick = ()=>{ navigator.clipboard.writeText(email); alert('Email copied!'); };
      qs('#copyMsg').onclick = ()=>{ navigator.clipboard.writeText(mailBody); alert('Message copied!'); };
    }

    // Form submission → public.leads (listing_id, name, phone, email, message)
    qs('#advisorForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = qs('#fName').value.trim();
      const phone = qs('#fPhone').value.trim();
      const email = qs('#fEmail').value.trim();
      const msg = qs('#fMsg').value.trim();
      const finance = qs('#fFinance').checked;
      const listing_id = getParam('id');

      const message = `${finance ? '[Financing: Yes] ' : ''}${msg}`;

      const { error } = await supabase.from('leads').insert({ listing_id, name, phone, email, message });
      if (error) { alert('Could not submit. Please try again.'); console.error(error); return; }
      alert('Thanks! EVTime Concierge has been notified.');
      closeDrawer();
    });

    // Load listing
    (async function init(){
      const id = getParam('id');
      if (!id) { location.href = 'share.html'; return; }

      const { data, error } = await supabase.from('listing').select('*').eq('id', id).single();
      if (error || !data) { console.error(error); alert('Listing not found.'); return; }

      // Title/specs block (simple)
      const title = [data.year, data.make, data.model, data.trim].filter(Boolean).join(' ');
      qs('#specs').innerHTML = `<h1 style="margin:8px 0 4px; font-size:22px;">${title}</h1>
        <div style="opacity:.85">${data.city ? data.city + ' • ' : ''}${data.mileage ? (data.mileage.toLocaleString() + ' mi • ') : ''}${data.price ? ('$' + data.price.toLocaleString()) : ''}</div>`;

      // Images (handle array or legacy string)
      let list = [];
      if (Array.isArray(data.images)) list = data.images;
      else if (typeof data.images === 'string' && data.images.trim()) {
        try { list = JSON.parse(data.images); if (!Array.isArray(list)) list = [data.images]; }
        catch { list = data.images.split(',').map(s=>s.trim()); }
      }
      imgs = list.map(p => normalizeImagePath(p, data.id)).filter(Boolean);
      if (!imgs.length) imgs = [''];
      idx = 0; renderCarousel();

      // Quick contact defaults
      const mailSub = 'EVTime Inquiry';
      const baseMsg = `Hello EVTime, I\'m interested in ${title}${data.vin ? ' (VIN: ' + data.vin + ')' : ''}.`;
      setQuickContact(PHONE_PUBLIC, EMAIL_PUBLIC, mailSub, baseMsg);

      // Hard-remove any legacy "Live Agent" nodes if present in template fragments
      qsa('a,button,[role="button"]').forEach(el=>{
        const t = (el.innerText || el.textContent || '').toLowerCase();
        if (t.includes('live agent')) el.remove();
        if (t.includes('talk to an advisor')) el.textContent = 'Contact an Advisor';
      });
    })();
  </script>
</body>
</html>
