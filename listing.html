<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EVTime — Vehicle Details</title>
<meta name="theme-color" content="#ffffff"/>

<style>
:root {
  --bg:#fafafa; --line:#e7e5e4; --text:#111; --muted:#666;
  --accent:#c98c5b; --accent-dark:#9e6d45;
}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);}
.wrap{max-width:880px;margin:0 auto;padding:16px;}
img{max-width:100%;display:block;border-radius:12px;}
h1{font-size:24px;margin:8px 0;}
h2{margin-top:24px;font-size:20px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;transition:.15s}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-dark);}
.meta{color:var(--muted);font-size:14px;margin:6px 0;}
.price{font-weight:900;font-size:20px;color:var(--accent-dark);}
.flex{display:flex;flex-wrap:wrap;gap:10px;}
/* Drawer */
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:9998;}
.drawer{position:fixed;top:0;right:-400px;width:360px;max-width:90vw;height:100%;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.1);transition:right .3s ease;z-index:9999;display:flex;flex-direction:column;}
.drawer.open{right:0;}
.drawer-backdrop.open{display:block;}
.drawer-header{padding:16px;border-bottom:1px solid var(--line);}
.drawer-header h3{margin:0;font-size:18px;}
.drawer-sub{color:var(--muted);font-size:13px;}
.drawer-tabs{display:flex;border-bottom:1px solid var(--line);}
.drawer-tab{flex:1;padding:12px;text-align:center;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;}
.drawer-tab.active{border-color:var(--accent);color:var(--accent-dark);}
.drawer-body{flex:1;overflow:auto;padding:16px;}
.drawer-footer{border-top:1px solid var(--line);padding:12px;text-align:center;font-size:13px;color:var(--muted);}
.contact-buttons{display:flex;flex-direction:column;gap:10px;}
.contact-buttons a{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:8px;text-decoration:none;font-weight:700;}
.contact-buttons a.call{background:var(--accent);color:#fff;}
.contact-buttons a.text{background:#eee;color:#111;}
.contact-buttons a.email{background:#eee;color:#111;}
.copy-links{margin-top:8px;text-align:center;}
.copy-links button{border:none;background:none;color:var(--accent-dark);cursor:pointer;font-size:13px;}
form label{display:block;margin-top:12px;font-weight:600;}
form input, form textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;}
form textarea{resize:vertical;}
.financing{display:flex;align-items:center;gap:8px;margin-top:12px;}
.financing input{width:auto;}
.success{color:#0a7;margin-top:8px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap" id="details"></div>

<!-- Concierge Drawer -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3>EVTime Concierge</h3>
    <div class="drawer-sub">Real humans. Fast replies.</div>
  </div>
  <div class="drawer-tabs">
    <div class="drawer-tab active" data-tab="contact">Quick Contact</div>
    <div class="drawer-tab" data-tab="form">Talk to an Advisor</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">We usually respond within 1 business hour.</div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async()=>{
const SUPABASE_URL=(window.SUPABASE_URL||"https://tgkvhmxrftcegpryptwq.supabase.co").trim();
const SUPABASE_ANON_KEY=(window.SUPABASE_ANON_KEY||"").trim();
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const $=id=>document.getElementById(id);
const mount=$("details");
const params=new URLSearchParams(location.search);
const id=params.get("id");
if(!id){mount.innerHTML="<p>Missing listing ID.</p>";return;}
const {data,error}=await supabase.from("listing").select("*").eq("id",id).single();
if(error||!data){mount.innerHTML="<p>Listing not found.</p>";return;}

const paths=Array.isArray(data.images)?data.images:data.images?JSON.parse(data.images):[];
const cover=paths[0]?supabase.storage.from("images").getPublicUrl(paths[0]).data.publicUrl:"og-card.png";
mount.innerHTML=`
  <img src="${cover}" alt="">
  <h1>${data.year||""} ${data.make||""} ${data.model||""} ${data.trim||""}</h1>
  <div class="price">$${Number(data.price||0).toLocaleString()}</div>
  <div class="meta">${data.city||""} • ${data.mileage?Number(data.mileage).toLocaleString()+" mi":""}</div>
  <p>${data.description||""}</p>
  <div class="flex">
    <button class="btn primary" id="liveAgent">Live Agent</button>
    <button class="btn" id="advisorBtn">Talk to an Advisor</button>
  </div>
`;

const drawer=$("drawer"),backdrop=$("drawerBackdrop"),body=$("drawerBody");
const tabs=[...drawer.querySelectorAll(".drawer-tab")];
function openDrawer(tab="contact"){
  drawer.classList.add("open");backdrop.classList.add("open");
  setTab(tab);
}
function closeDrawer(){
  drawer.classList.remove("open");backdrop.classList.remove("open");
}
backdrop.onclick=closeDrawer;
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});

function setTab(tabName){
  tabs.forEach(t=>t.classList.toggle("active",t.dataset.tab===tabName));
  if(tabName==="contact") renderContact(); else renderForm();
}

tabs.forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

function renderContact(){
body.innerHTML=`
  <div class="contact-buttons">
    <a class="call" href="tel:+14244256211">Call Now</a>
    <a class="text" href="sms:+14244256211?body=Hi! I’m interested in ${data.year||""} ${data.make||""} ${data.model||""}">Text Now</a>
    <a class="email" href="mailto:welcome.evtime@gmail.com?subject=Inquiry about ${data.year||""} ${data.make||""} ${data.model||""}">Email Concierge</a>
  </div>
  <div class="copy-links">
    <button id="copyEmail">Copy email</button> • <button id="copyMsg">Copy message</button>
  </div>`;
$("copyEmail").onclick=()=>{navigator.clipboard.writeText("welcome.evtime@gmail.com");alert("Email copied.");};
$("copyMsg").onclick=()=>{navigator.clipboard.writeText("Hi! I’m interested in "+(data.year||"")+" "+(data.make||"")+" "+(data.model||""));alert("Message copied.");};
}

function renderForm(){
body.innerHTML=`
<form id="advisorForm">
  <label>Name</label><input id="name" required>
  <label>Phone</label><input id="phone" required>
  <label>Email</label><input id="email" type="email" required>
  <label>Message</label><textarea id="msg" rows="4" placeholder="Hi! I’m interested in ${data.year||""} ${data.make||""} ${data.model||""}"></textarea>
  <div class="financing">
    <input type="checkbox" id="financeChk"> <label for="financeChk">I’m interested in Financing</label>
  </div>
  <button class="btn primary" type="submit" style="margin-top:14px;">Send to Concierge</button>
  <div id="formMsg" class="success"></div>
</form>`;
$("advisorForm").onsubmit=async(e)=>{
e.preventDefault();
const payload={
  name:$("name").value.trim(),
  phone:$("phone").value.trim(),
  email:$("email").value.trim(),
  message:$("msg").value.trim(),
  financing:$("financeChk").checked,
  listing_id:id,
  created_at:new Date().toISOString()
};
const {error}=await supabase.from("leads").insert(payload);
$("formMsg").textContent=error?"Error sending.":"Thanks! We received your note.";
if(!error)setTimeout(closeDrawer,2000);
};
}

$("liveAgent").onclick=()=>openDrawer("contact");
$("advisorBtn").onclick=()=>openDrawer("form");
})();
</script>
</body>
</html>
