<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EVTime — Vehicle Details</title>
<meta name="theme-color" content="#0b0a09"/>

<style>
:root{
  --bg:#0b0a09;
  --card:#ffffff;
  --text:#1c1917;
  --muted:#78716c;
  --line:#e7e5e4;
  --copper:#c98c5b;
  --copper-dark:#9e6d45;
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
.wrap{max-width:880px;margin:0 auto;padding:12px}

/* Header / Logo */
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.logo-wrap{max-width:880px;margin:0 auto;padding:0 12px}
#site-logo{display:block;width:100%;height:auto;max-height:200px;object-fit:contain}
@media (max-width:600px){ #site-logo{max-height:220px} }

/* Card */
.card{
  background:#fff;border:1px solid var(--line);border-radius:14px;overflow:visible;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}

/* HERO + CAROUSEL */
.hero{
  position:relative;background:#000;border-top-left-radius:14px;border-top-right-radius:14px;
  overflow:hidden;border-bottom:1px solid var(--line);
}
.hero-frame{
  position:relative;background:#000;
  border:1px solid var(--copper);
  border-radius:12px;margin:12px;
  overflow:hidden;
}
.slide{
  width:100%;height:60vh;max-height:72vh;min-height:320px;
  display:flex;align-items:center;justify-content:center;
  background:#000;position:relative;
}
.media-img, .media-video{
  width:100%;height:100%;object-fit:contain;display:block;background:#000;
}

/* Video play overlay */
.play-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(transparent,rgba(0,0,0,.25) 35%,rgba(0,0,0,.55));
  opacity:1;transition:opacity .2s;
}
.play-overlay.hidden{opacity:0;pointer-events:none}
.play-btn{
  border:none;border-radius:999px;cursor:pointer;width:70px;height:70px;
  background:rgba(0,0,0,.6);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(0,0,0,.35)
}
.sound-tip{
  position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.55);
  color:#fff;border-radius:999px;padding:6px 10px;font-size:12px
}

/* Carousel controls */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.14);color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.nav-prev{left:16px}
.nav-next{right:16px}

/* Dots */
.dots{position:absolute;left:0;right:0;bottom:10px;display:flex;gap:8px;justify-content:center;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer}
.dot.active{background:#fff}
@media (hover:hover){
  .dot:hover{background:rgba(255,255,255,.6)}
}

/* SOLD badge */
.sold{position:absolute;top:18px;left:18px;background:rgba(0,0,0,.75);color:#fff;
  padding:6px 10px;border-radius:999px;font-weight:900;font-size:12px;letter-spacing:.03em}

/* Body */
.body{padding:14px 16px 18px}
.title{font-weight:900;font-size:20px}
.price{font-weight:900;color:#0b0a09;background:var(--copper);padding:2px 10px;border-radius:999px;display:inline-block;margin-top:6px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;background:#f8f8f8}
.meta{margin-top:8px;color:#57534e;font-weight:700;font-size:13px;display:flex;gap:14px;flex-wrap:wrap}
.desc{margin-top:10px;color:#44403c;font-size:14px;white-space:pre-wrap}

/* Actions */
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;justify-content:center;height:42px;padding:0 14px;
  border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:800;text-decoration:none;color:#111;cursor:pointer;transition:.15s
}
.btn.primary{background:var(--copper);border-color:transparent;color:#0b0a09}
.btn.primary:hover{background:var(--copper-dark);color:#fff}

/* Footer */
.footer{border-top:1px solid var(--line);background:#fff;margin-top:24px}
.footer .wrap{padding:16px 12px;color:#44403c;font-size:13px}

/* Concierge Drawer */
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:9998}
.drawer{position:fixed;top:0;right:-420px;width:380px;max-width:92vw;height:100%;
  background:#fff;box-shadow:-6px 0 28px rgba(0,0,0,.18);transition:right .3s ease;z-index:9999;display:flex;flex-direction:column;border-left:1px solid var(--line)}
.drawer.open{right:0}
.drawer-backdrop.open{display:block}
.drawer-header{padding:16px;border-bottom:1px solid var(--line)}
.drawer-header h3{margin:0;font-size:18px}
.drawer-sub{color:var(--muted);font-size:13px}
.drawer-tabs{display:flex;border-bottom:1px solid var(--line)}
.drawer-tab{flex:1;padding:12px;text-align:center;font-weight:700;cursor:pointer;border-bottom:3px solid transparent}
.drawer-tab.active{border-color:var(--copper);color:var(--copper-dark)}
.drawer-body{flex:1;overflow:auto;padding:16px}
.drawer-footer{border-top:1px solid var(--line);padding:12px;text-align:center;font-size:13px;color:var(--muted)}
.contact-buttons{display:flex;flex-direction:column;gap:10px}
.contact-buttons a{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:800;border:1px solid var(--line);color:#111;background:#fff}
.contact-buttons a.call{background:var(--copper);color:#0b0a09;border-color:transparent}
.copy-links{margin-top:8px;text-align:center}
.copy-links button{border:none;background:none;color:var(--copper-dark);cursor:pointer;font-size:13px}
form label{display:block;margin-top:12px;font-weight:700}
form input,form textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px}
form textarea{resize:vertical}
.financing{display:flex;align-items:center;gap:8px;margin-top:12px}
.financing input{width:auto}
.success{color:#0a7;margin-top:8px;font-weight:700}
.back{margin:10px 0 0}.back a{color:var(--copper);text-decoration:none;border-bottom:1px dotted var(--copper)}
</style>
</head>
<body>

<!-- Topbar / Logo -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="/" aria-label="Go to Home">
      <img id="site-logo" src="mainlogo.svg?v=402" alt="EVTime">
    </a>
  </div>
</div>

<div class="wrap">
  <div class="back"><a href="./share.html">← Back to inventory</a></div>
  <div id="mount"></div>
</div>

<footer class="footer">
  <div class="wrap">© <span id="yr"></span> E.V.Time</div>
</footer>

<!-- Concierge Drawer -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3>EVTime Concierge</h3>
    <div class="drawer-sub">Real humans. Fast replies.</div>
  </div>
  <div class="drawer-tabs">
    <div class="drawer-tab active" data-tab="contact">Quick Contact</div>
    <div class="drawer-tab" data-tab="form">Contact an Advisor</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">We usually respond within 1 business hour.</div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const SUPABASE_URL=(window.SUPABASE_URL||"https://tgkvhmxrftcegpryptwq.supabase.co").trim();
  const SUPABASE_ANON_KEY=(window.SUPABASE_ANON_KEY||"").trim();
  const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

  const $=id=>document.getElementById(id);
  document.getElementById('yr').textContent=new Date().getFullYear();

  // Helpers
  const esc=(s)=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function parseImages(images){
    if(!images) return [];
    if(Array.isArray(images)) return images;
    const s=String(images||'').trim();
    if(s.startsWith('[')){ try{ return JSON.parse(s)||[] }catch{ return [] } }
    return s.split(',').map(v=>v.trim()).filter(Boolean);
  }
  function normalize(path){
    return String(path||'').trim().replace(/^\/+/, '').replace(/^(images\/)+/i,'');
  }
  function publicImageUrls(path){
    let s=String(path||'').trim().replace(/^\/+/, '');
    if(!s) return [];
    const candidates=[];
    if(/^images\/images\//i.test(s)) candidates.push(s.replace(/^images\/images\//i,'images/'));
    candidates.push(s);
    candidates.push(s.replace(/^images\//i,''));
    if(!/^images\//i.test(s)) candidates.push('images/'+s);
    const uniq=[...new Set(candidates)];
    return uniq.map(p=>supabase.storage.from('images').getPublicUrl(p).data?.publicUrl||null).filter(Boolean);
  }
  function preload(url){ if(!url) return; const im=new Image(); im.decoding='async'; im.loading='eager'; im.src=url; }

  // Load listing
  const mount=$('mount');
  const id=new URLSearchParams(location.search).get('id');
  if(!id){ mount.innerHTML = `<div class="card body" style="padding:16px">Missing listing id.</div>`; return; }

  (async () => {
    const { data, error } = await supabase.from('listing').select('*').eq('id', id).single();
    if(error || !data){ mount.innerHTML = `<div class="card body" style="padding:16px">Listing not found.</div>`; return; }

    const title=[data.year,data.make,data.model,data.trim].filter(Boolean).join(' ');
    document.title = `EVTime — ${title}`;

    // Build media array: images first, then optional video as last slide
    const paths=parseImages(data.images).map(normalize);
    const imageUrls=paths.map(p=>publicImageUrls(p)[0]||null).filter(Boolean);

    const media=[];
    imageUrls.forEach(u=>media.push({type:'image', src:u}));

    const videoUrl = data.video || null;
    const posterUrl = data.video_poster || null;

    if(videoUrl){
      media.push({type:'video', src:videoUrl, poster:posterUrl || imageUrls[0] || 'og-card.png'});
    }

    // Fallback hero (first media or site OG)
    const firstMedia = media[0] || {type:'image', src:'og-card.png'};

    const leftMeta=[
      data.mileage ? `${Number(data.mileage).toLocaleString()} mi` : null,
      data.title_status ? `Title: ${data.title_status}` : null,
      data.condition ? `Cond: ${data.condition}` : null
    ].filter(Boolean).join(' • ');

    const priceText=(data.price!=null && data.price!=='') ? `$${Number(data.price).toLocaleString()}` : '';
    const sold = String(data.status||'').toLowerCase()==='sold' ? `<div class="sold">SOLD</div>` : '';

    // Page HTML
    mount.innerHTML = `
      <div class="card">
        <div class="hero">
          ${sold}
          <div class="hero-frame">
            <div class="slide">
              ${firstMedia.type==='video'
                ? `<video id="heroVid" class="media-video" preload="metadata" playsinline webkit-playsinline muted poster="${esc(firstMedia.poster||'')}"></video>
                   <div id="playOverlay" class="play-overlay">
                     <button id="playBtn" class="play-btn">▶</button>
                     <div class="sound-tip">Sound on after play</div>
                   </div>`
                : `<img id="heroImg" class="media-img" src="${esc(firstMedia.src)}" alt="${esc(title)}" decoding="async">`
              }
              ${media.length>1 ? `
                <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous">‹</button>
                <button class="nav-btn nav-next" id="nextBtn" aria-label="Next">›</button>
                <div class="dots" id="dots"></div>
              `:``}
            </div>
          </div>
        </div>

        <div class="body">
          <div class="title">${esc(title)}</div>
          ${priceText ? `<div class="price">${esc(priceText)}</div>` : ``}
          <div class="badges">
            ${data.vehicle_type ? `<div class="badge">${esc(String(data.vehicle_type).toUpperCase())}</div>` : ``}
            ${data.city ? `<div class="badge">${esc(data.city)}</div>` : ``}
            ${data.vin ? `<div class="badge">VIN: ${esc(data.vin)}</div>` : ``}
          </div>
          <div class="meta">${esc(leftMeta)}</div>
          ${data.special_features ? `<div class="desc"><strong>Features:</strong> ${esc(data.special_features)}</div>` : ``}
          ${data.description ? `<div class="desc">${esc(data.description)}</div>` : ``}

          <div class="actions">
            <button class="btn primary" id="advisorBtn" type="button">Contact an Advisor</button>
            ${videoUrl ? `<a class="btn" href="${esc(videoUrl)}" target="_blank" rel="noopener">Watch Video</a>` : ``}
            <a class="btn" href="./share.html">Back</a>
          </div>
        </div>
      </div>
    `;

    // Elements (may or may not exist depending on first media)
    const heroImg = document.getElementById('heroImg');
    const heroVid = document.getElementById('heroVid');
    const playOverlay = document.getElementById('playOverlay');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsEl = document.getElementById('dots');

    // Carousel state
    let idx = 0;

    // Initialize first media content when it's a video
    if (heroVid && firstMedia.type==='video') {
      heroVid.src = firstMedia.src;
      if (firstMedia.poster) heroVid.setAttribute('poster', firstMedia.poster);
    }

    function renderDots(){
      if(!dotsEl) return;
      dotsEl.innerHTML = media.map((m,i)=>`<div class="dot${i===idx?' active':''}" data-i="${i}" title="${m.type==='video'?'Video':'Photo'}"></div>`).join('');
    }

    function stopVideo(){
      if(heroVid){
        heroVid.pause();
        heroVid.currentTime = 0;
      }
      if(playOverlay) playOverlay.classList.remove('hidden');
    }

    function show(i){
      if(!media.length) return;
      idx = (i + media.length) % media.length;
      const m = media[idx];

      if (m.type === 'image') {
        // Switch to image element
        if (!heroImg) {
          // Replace video markup with image
          const slide = document.querySelector('.slide');
          slide.innerHTML = `<img id="heroImg" class="media-img" src="${esc(m.src)}" alt="${esc(title)}" decoding="async">
            ${media.length>1 ? `
              <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous">‹</button>
              <button class="nav-btn nav-next" id="nextBtn" aria-label="Next">›</button>
              <div class="dots" id="dots"></div>` : ``}`;
          // rebind elements
          bindNav();
        } else {
          heroImg.style.opacity = '0';
          const next= m.src;
          setTimeout(()=>{
            heroImg.src = next;
            heroImg.onload = ()=>{ heroImg.style.opacity = '1'; };
          }, 120);
        }
      } else {
        // Switch to video element
        if (!heroVid) {
          const slide = document.querySelector('.slide');
          slide.innerHTML = `
            <video id="heroVid" class="media-video" preload="metadata" playsinline webkit-playsinline muted poster="${esc(m.poster||'')}"></video>
            <div id="playOverlay" class="play-overlay">
              <button id="playBtn" class="play-btn">▶</button>
              <div class="sound-tip">Sound on after play</div>
            </div>
            ${media.length>1 ? `
              <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous">‹</button>
              <button class="nav-btn nav-next" id="nextBtn" aria-label="Next">›</button>
              <div class="dots" id="dots"></div>` : ``}`;
          bindNav();
          const hv=document.getElementById('heroVid');
          hv.src = m.src;
          if(m.poster) hv.setAttribute('poster', m.poster);
          const po=document.getElementById('playOverlay');
          const pb=document.getElementById('playBtn');
          if(pb) pb.onclick = async ()=>{
            try{
              // Unmute only after user gesture; some browsers require user action
              hv.muted = false;
              await hv.play();
              if(po) po.classList.add('hidden');
            }catch{
              // If autoplay with sound is blocked, keep muted on first play
              hv.muted = true;
              await hv.play();
              if(po) po.classList.add('hidden');
            }
          };
        } else {
          stopVideo();
          heroVid.src = m.src;
          if(m.poster) heroVid.setAttribute('poster', m.poster);
        }
      }
      // Preload neighbor image
      const nextIdx = (idx+1) % media.length;
      const nm = media[nextIdx];
      if (nm && nm.type==='image') preload(nm.src);

      renderDots();
    }

    function bindNav(){
      // rebind elements after slide content replacement
      const _prev=document.getElementById('prevBtn');
      const _next=document.getElementById('nextBtn');
      const _dots=document.getElementById('dots');
      if(_prev) _prev.onclick=()=>{ stopVideo(); show(idx-1); };
      if(_next) _next.onclick=()=>{ stopVideo(); show(idx+1); };
      if(_dots){
        _dots.addEventListener('click', (e)=>{
          const d=e.target.closest('.dot');
          if(!d) return;
          stopVideo();
          show(Number(d.getAttribute('data-i')||0));
        });
      }
      renderDots();

      // swipe support (bind to whichever media is present)
      const slideMedia = document.querySelector('.slide video, .slide img');
      if(slideMedia){
        let sx=null, sy=null;
        slideMedia.addEventListener('touchstart',(e)=>{
          const t=e.touches[0];
          sx=t.clientX; sy=t.clientY;
        },{passive:true});
        slideMedia.addEventListener('touchend',(e)=>{
          if(sx==null) return;
          const dx=e.changedTouches[0].clientX - sx;
          const dy=e.changedTouches[0].clientY - sy;
          if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
            if(dx<0) show(idx+1); else show(idx-1);
          }
          sx=sy=null;
        },{passive:true});
      }
    }

    // Initial bindings
    bindNav();
    // If first is image, ensure neighbor preload
    if (media[1] && media[1].type==='image') preload(media[1].src);

    // Concierge Drawer
    const drawer=$('drawer'), backdrop=$('drawerBackdrop'), body=$('drawerBody');
    const tabs=[...drawer.querySelectorAll('.drawer-tab')];

    function openDrawer(tab='contact'){
      drawer.classList.add('open');
      backdrop.classList.add('open');
      setTab(tab);
    }
    function closeDrawer(){
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
    }
    backdrop.onclick=closeDrawer;
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeDrawer(); });

    function setTab(tabName){
      tabs.forEach(t=>t.classList.toggle('active', t.dataset.tab===tabName));
      if(tabName==='contact') renderContact(); else renderForm();
    }
    tabs.forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

    function renderContact(){
      const phone='+14244256211';
      const smsBody=encodeURIComponent('Hi! I’m interested in ' + title);
      const email='welcome.evtime@gmail.com';

      body.innerHTML = `
        <div class="contact-buttons">
          <a class="call" href="tel:${phone}">Call Now</a>
          <a class="text" href="sms:${phone}?body=${smsBody}">Text Now</a>
          <a class="email" href="https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=EVTime%20Inquiry" target="_blank"
             onclick="if(!window.location.hostname.includes('mail.google.com')){navigator.clipboard.writeText('${email}'); alert('Email address copied!');}">
             Email Concierge
          </a>
        </div>
        <div class="copy-links">
          <button id="copyEmail">Copy email</button> • <button id="copyMsg">Copy message</button>
        </div>
      `;
      $('copyEmail').onclick=()=>{ navigator.clipboard.writeText(email); alert('Email copied.'); };
      $('copyMsg').onclick=()=>{ navigator.clipboard.writeText('Hi! I’m interested in '+title); alert('Message copied.'); };
    }

    function renderForm(){
      body.innerHTML = `
        <form id="advisorForm">
          <label>Name</label><input id="name" autocomplete="name" required>
          <label>Phone</label><input id="phone" autocomplete="tel">
          <label>Email</label><input id="email" type="email" autocomplete="email">
          <label>Message</label><textarea id="msg" rows="4" placeholder="Hi! I’m interested in ${esc(title)}"></textarea>
          <div class="financing">
            <input type="checkbox" id="financeChk">
            <label for="financeChk">I’m interested in Financing</label>
          </div>
          <button class="btn primary" type="submit" style="margin-top:14px;">Send to Concierge</button>
          <div id="formMsg" class="success" role="status" aria-live="polite"></div>
        </form>
      `;
      $('advisorForm').onsubmit=async(e)=>{
        e.preventDefault();
        const name=$('name').value.trim();
        const phone=$('phone').value.trim();
        const email=$('email').value.trim();
        const message=$('msg').value.trim();
        const financing=$('financeChk').checked;

        if(!phone && !email){
          $('formMsg').textContent='Please enter a phone or email so we can reach you.';
          $('formMsg').style.color='#b00020';
          return;
        }
        const combinedMessage=(financing? '[Financing: Yes] ' : '[Financing: No] ') + message;

        const { error } = await supabase.from('leads').insert({
          listing_id:id, name, phone, email, message: combinedMessage
        }, { returning:'minimal' });

        if(error){
          $('formMsg').textContent='Could not send. Please try again.';
          $('formMsg').style.color='#b00020';
        } else {
          $('formMsg').textContent='Thanks! We received your note.';
          $('formMsg').style.color='#0a7';
          setTimeout(closeDrawer, 1200);
          e.target.reset();
        }
      };
    }

    document.getElementById('advisorBtn').onclick=()=>openDrawer('form');
  })();
})();
</script>
</body>
</html>
