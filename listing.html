<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vehicle Details — E.V.Time</title>
<meta name="description" content="View vehicle details, photos, and contact our team for more information."/>

<meta property="twitter:description" content="Buy and sell electric vehicles with confidence. Licensed DMV services, secure escrow, and honest offers."/>

<style>
#header-placeholder { position: sticky; top: 0; z-index: 100; }
.wrap { max-width: 880px; margin: 0 auto; padding: 24px; }
.card { background: var(--bg-light); border: 1px solid var(--line); border-radius: 14px; padding: 24px; margin: 12px 0; }
.back-link { display: inline-block; color: var(--copper); text-decoration: none; margin-bottom: 16px; font-weight: 600; }
.back-link:hover { text-decoration: underline; }
.hero { width: 100%; max-height: 500px; object-fit: contain; background: #f5f0e8; border-radius: 12px; margin-bottom: 16px; }
.video-player { width: 100%; border-radius: 12px; margin-bottom: 16px; }
.title { font-size: 32px; font-weight: 700; margin: 16px 0; color: var(--text); }
.price { font-size: 28px; font-weight: 700; color: var(--copper); margin: 8px 0; }
.badge { display: inline-block; background: #e8e5f3; color: #333; padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: 600; margin: 4px 8px 4px 0; }
.sold-badge { background: #666; color: #fff; }
.meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 16px 0; }
.meta-item { font-size: 14px; }
.meta-label { font-weight: 600; color: var(--text-muted); }
.meta-value { color: var(--text); margin-top: 4px; }
.description { line-height: 1.6; margin: 16px 0; white-space: pre-wrap; }
.btn-primary { display: inline-block; background: var(--copper); color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 16px; cursor: pointer; border: none; font-size: 16px; }
.btn-primary:hover { opacity: 0.9; }
.drawer { position: fixed; top: 0; right: -100%; width: 400px; max-width: 90%; height: 100vh; background: #fff; box-shadow: -2px 0 12px rgba(0,0,0,0.2); transition: right 0.3s ease; z-index: 1000; overflow-y: auto; }
.drawer.open { right: 0; }
.drawer-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
.drawer-overlay.open { display: block; }
.drawer-header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.drawer-close { background: none; border: none; font-size: 24px; cursor: pointer; }
.drawer-content { padding: 20px; }
.tabs { display: flex; border-bottom: 2px solid var(--line); margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; }
.tab.active { border-bottom-color: var(--copper); color: var(--copper); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.quick-contact { display: flex; flex-direction: column; gap: 12px; }
.contact-btn { padding: 12px; text-align: center; border-radius: 8px; font-weight: 600; text-decoration: none; display: block; }
.contact-call { background: #4CAF50; color: #fff; }
.contact-text { background: #2196F3; color: #fff; }
.contact-email { background: var(--copper); color: #fff; }
input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 6px; margin: 8px 0; font-size: 14px; font-family: inherit; }
textarea { min-height: 100px; resize: vertical; }
label { display: block; font-weight: 600; margin-top: 12px; }
.checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: normal; }
.checkbox-label input { width: auto; }
.form-msg { padding: 12px; border-radius: 6px; margin: 12px 0; }
.form-msg.success { background: #d4edda; color: #155724; }
.form-msg.error { background: #f8d7da; color: #721c24; }
.gallery { position: relative; }
.gallery-controls { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 12px; pointer-events: none; }
.gallery-btn { background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; pointer-events: all; font-size: 20px; }
.gallery-btn:hover { background: rgba(0,0,0,0.7); }
.gallery-dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; cursor: pointer; }
.dot.active { background: var(--copper); }
@media (max-width: 768px) {
  .drawer { width: 100%; }
  .title { font-size: 24px; }
  .price { font-size: 22px; }
}
</style>
</head>
<body data-page="listing">

<div id="header-placeholder"></div>

<div class="wrap">
  <a href="./share.html" class="back-link">← Back to inventory</a>
  <div id="mount"></div>
</div>

<div id="footer-placeholder"></div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3>Contact Concierge</h3>
    <button class="drawer-close" id="drawerClose">×</button>
  </div>
  <div class="drawer-content">
    <div class="tabs">
      <div class="tab active" data-tab="quick">Quick Contact</div>
      <div class="tab" data-tab="advisor">Contact an Advisor</div>
    </div>
    
    <div class="tab-panel active" id="quickPanel">
      <div class="quick-contact">
        <a href="tel:+1234567890" class="contact-btn contact-call">📞 Call Now</a>
        <a href="sms:+1234567890" class="contact-btn contact-text">💬 Text Now</a>
        <button class="contact-btn contact-email" id="copyEmail">📧 Email Concierge</button>
        <p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">
          Email: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="addac8c1cec2c0c883c8dbd9c4c0c8edcac0ccc4c183cec2c0">[email&#160;protected]</a><br/>
          <button id="copyMessage" style="margin-top: 8px; padding: 6px 12px; font-size: 12px;">Copy Message Template</button>
        </p>
      </div>
    </div>
    
    <div class="tab-panel" id="advisorPanel">
      <form id="advisorForm">
        <label>Name *</label>
        <input type="text" id="advName" required/>
        
        <label>Phone</label>
        <input type="tel" id="advPhone"/>
        
        <label>Email</label>
        <input type="email" id="advEmail"/>
        
        <label>Message *</label>
        <textarea id="advMessage" required placeholder="I'm interested in this vehicle..."></textarea>
        
        <label class="checkbox-label">
          <input type="checkbox" id="advFinancing"/>
          I need financing assistance
        </label>
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Send Message</button>
        <div id="advFormMsg" class="form-msg" style="display: none;"></div>
      </form>
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./search.js"></script>
<script>
const url = window.SUPABASE_URL || 'https://tgkvhmxrftcegpryptwq.supabase.co';
const anonKey = window.SUPABASE_ANON_KEY || '';
const sb = supabase.createClient(url, anonKey);

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('mount').innerHTML = '<div class="card">Missing listing id.</div>';
} else {
  (async () => {
    const { data, error } = await sb.from('listing').select('*').eq('id', id).single();
    if (error || !data) {
      document.getElementById('mount').innerHTML = '<div class="card">Listing not found.</div>';
      return;
    }
    
    const item = data;
    const title = [item.year, item.make, item.model, item.trim].filter(Boolean).join(' ');
    const price = item.price ? `$${item.price.toLocaleString()}` : 'Contact for price';
    const soldBadge = item.status === 'sold' ? '<span class="badge sold-badge">SOLD</span>' : '';
    
    const parseImages = (raw) => {
      if (Array.isArray(raw)) return raw;
      if (typeof raw === 'string') {
        try { return JSON.parse(raw); } catch { return []; }
      }
      return [];
    };
    
    const normalize = p => (p && p.startsWith('/')) ? p.substring(1) : (p || '');
    
    const publicImageUrls = (images) => {
      if (!images || images.length === 0) return [];
      return images.map(p => {
        if (p.startsWith('http')) return p;
        const clean = normalize(p);
        return `${url}/storage/v1/object/public/images/${clean}`;
      });
    };
    
    const imageUrls = publicImageUrls(parseImages(item.images));
    let mediaHTML = '';
    
    if (imageUrls.length > 0) {
      const hero = imageUrls[0];
      mediaHTML = `<div class="gallery"><img src="${hero}" alt="${title}" class="hero" id="heroImg"/>`;
      
      if (imageUrls.length > 1) {
        mediaHTML += `
          <div class="gallery-controls">
            <button class="gallery-btn" id="prevBtn">‹</button>
            <button class="gallery-btn" id="nextBtn">›</button>
          </div>
          <div class="gallery-dots" id="dots"></div>
        `;
      }
      mediaHTML += '</div>';
      
      // Preload second image
      if (imageUrls.length > 1) {
        const preload = new Image();
        preload.src = imageUrls[1];
      }
    }
    
    const meta = `
      <div class="meta-grid">
        ${item.mileage ? `<div class="meta-item"><div class="meta-label">Mileage</div><div class="meta-value">${item.mileage.toLocaleString()} mi</div></div>` : ''}
        ${item.title_status ? `<div class="meta-item"><div class="meta-label">Title Status</div><div class="meta-value">${item.title_status}</div></div>` : ''}
        ${item.condition ? `<div class="meta-item"><div class="meta-label">Condition</div><div class="meta-value">${item.condition}</div></div>` : ''}
        ${item.vehicle_type ? `<div class="meta-item"><div class="meta-label">Type</div><div class="meta-value">${item.vehicle_type}</div></div>` : ''}
        ${item.city ? `<div class="meta-item"><div class="meta-label">Location</div><div class="meta-value">${item.city}</div></div>` : ''}
        ${item.vin ? `<div class="meta-item"><div class="meta-label">VIN</div><div class="meta-value">${item.vin}</div></div>` : ''}
      </div>
    `;
    
    const description = item.description ? `<div class="description">${item.description}</div>` : '';
    
    const html = `
      <div class="card">
        ${mediaHTML}
        <h1 class="title">${title} ${soldBadge}</h1>
        <div class="price">${price}</div>
        ${item.vehicle_type ? `<span class="badge">${item.vehicle_type}</span>` : ''}
        ${item.city ? `<span class="badge">${item.city}</span>` : ''}
        ${meta}
        ${description}
        <button class="btn-primary" id="contactBtn">Contact an Advisor</button>
      </div>
    `;
    
    document.getElementById('mount').innerHTML = html;
    
    // Gallery navigation
    if (imageUrls.length > 1) {
      let currentIndex = 0;
      const heroImg = document.getElementById('heroImg');
      const dotsContainer = document.getElementById('dots');
      
      imageUrls.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => showImage(i));
        dotsContainer.appendChild(dot);
      });
      
      const showImage = (index) => {
        currentIndex = index;
        heroImg.src = imageUrls[index];
        document.querySelectorAll('.dot').forEach((d, i) => {
          d.classList.toggle('active', i === index);
        });
      };
      
      document.getElementById('prevBtn').addEventListener('click', () => {
        showImage((currentIndex - 1 + imageUrls.length) % imageUrls.length);
      });
      
      document.getElementById('nextBtn').addEventListener('click', () => {
        showImage((currentIndex + 1) % imageUrls.length);
      });
      
      // Touch swipe
      let touchStartX = 0;
      heroImg.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
      heroImg.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].clientX;
        if (touchStartX - touchEndX > 50) showImage((currentIndex + 1) % imageUrls.length);
        if (touchEndX - touchStartX > 50) showImage((currentIndex - 1 + imageUrls.length) % imageUrls.length);
      });
    }
    
    // Drawer
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawerOverlay');
    
    document.getElementById('contactBtn').addEventListener('click', () => {
      drawer.classList.add('open');
      overlay.classList.add('open');
    });
    
    document.getElementById('drawerClose').addEventListener('click', () => {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
    });
    
    overlay.addEventListener('click', () => {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
    });
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(target + 'Panel').classList.add('active');
      });
    });
    
    // Copy email
    document.getElementById('copyEmail').addEventListener('click', () => {
      navigator.clipboard.writeText('welcome.evtime@gmail.com');
      alert('Email copied!');
    });
    
    document.getElementById('copyMessage').addEventListener('click', () => {
      const msg = `Hi, I'm interested in the ${title}. Can you provide more details?`;
      navigator.clipboard.writeText(msg);
      alert('Message template copied!');
    });
    
    // Form submission
    document.getElementById('advisorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('advName').value.trim();
      const phone = document.getElementById('advPhone').value.trim();
      const email = document.getElementById('advEmail').value.trim();
      const message = document.getElementById('advMessage').value.trim();
      const financing = document.getElementById('advFinancing').checked;
      
      if (!name || !message) {
        showMsg('Please fill all required fields.', 'error');
        return;
      }
      
      if (!phone && !email) {
        showMsg('Please provide either phone or email.', 'error');
        return;
      }
      
      const combinedMessage = `${message}${financing ? '\n\n[Financing needed]' : ''}`;
      
      try {
        const { error } = await sb.from('leads').insert([{
          listing_id: id,
          name,
          phone,
          email,
          message: combinedMessage
        }]);
        
        if (error) throw error;
        
        showMsg('Message sent! We will respond within 24 hours.', 'success');
        document.getElementById('advisorForm').reset();
        setTimeout(() => {
          drawer.classList.remove('open');
          overlay.classList.remove('open');
        }, 2000);
      } catch (err) {
        showMsg('Error sending message. Please email welcome.evtime@gmail.com', 'error');
      }
    });
    
    function showMsg(msg, type) {
      const el = document.getElementById('advFormMsg');
      el.textContent = msg;
      el.className = 'form-msg ' + type;
      el.style.display = 'block';
    }
  })();
}

// Load header/footer
fetch('./header.html').then(r => r.text()).then(h => { document.getElementById('header-placeholder').innerHTML = h; });
fetch('./footer.html').then(r => r.text()).then(f => { document.getElementById('footer-placeholder').innerHTML = f; });
</script>
<script src="/app.js"></script>
</body>
</html>
