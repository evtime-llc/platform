<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EVTime • Admin (Auth Only)</title>
  <style>
    :root { --copper:#C88243; --text:#191919; --muted:#6b7280; --border:#e5e7eb; --bg:#0d0d0d; --card:#ffffff; }
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .wrap{max-width:720px;margin:0 auto;padding:16px;}
    .bar{display:flex;align-items:center;gap:12px;justify-content:space-between}
    .pill{padding:8px 12px;border-radius:999px;cursor:pointer}
    .btn-primary{background:var(--copper);color:#fff;border:0}
    .btn-ghost{background:#fff;border:1px solid var(--border)}
    .muted{color:var(--muted)}
    .card{background:var(--card);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:18px;margin:18px 0 24px}
    hr{border:0;border-top:1px solid var(--border);margin:10px 0 16px}
    input[type="email"]{padding:10px 12px;border:1px solid var(--border);border-radius:10px;min-width:260px}
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="bar" style="margin:16px 0 8px;">
      <div class="bar" style="gap:10px;">
        <strong>EVTime • Admin</strong>
        <span id="authStatus" class="muted">Loading…</span>
      </div>
      <form id="signinForm" class="bar" style="display:none;">
        <input id="emailInput" type="email" required value="vahehr@gmail.com" />
        <button type="submit" class="pill btn-primary">Send login link</button>
      </form>
      <div id="signedInControls" class="bar" style="display:none;">
        <button id="signOutBtn" class="pill btn-ghost">Sign out</button>
      </div>
    </header>
    <hr>
    <div class="card">
      <p class="muted" id="note">Auth-only debug page. Once this shows “Signed in as …” we’ll restore the full Admin form.</p>
    </div>
  </div>

  <script>
    // --- Supabase init ---
    const SUPABASE_URL = "https://tgkvhmxrftcegpryptwq.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRna3ZobXhyZnRjZWdwcnlwdHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MDg3MDYsImV4cCI6MjA3NDA4NDcwNn0.3ahUcRJjrd3WoMsKDoaYXjcbM2UoltAZbQz7nVSqliQ";
    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ persistSession:true, autoRefreshToken:true } });

    // --- Elements ---
    const authStatus = document.getElementById('authStatus');
    const signinForm = document.getElementById('signinForm');
    const emailInput = document.getElementById('emailInput');
    const signedInControls = document.getElementById('signedInControls');
    const signOutBtn = document.getElementById('signOutBtn');

    // --- Helpers ---
    function cleanUrl(){ history.replaceState({}, document.title, location.pathname); }
    function showSignedOut(){
      authStatus.textContent = 'Not signed in';
      signinForm.style.display = 'flex';
      signedInControls.style.display = 'none';
    }
    function showSignedIn(email){
      authStatus.textContent = 'Signed in as ' + email;
      signinForm.style.display = 'none';
      signedInControls.style.display = 'flex';
    }

    // Handle tokens from URL (hash or query)
    async function processAuthFromUrl() {
      // Try official helper first (covers most cases)
      try {
        if (location.hash || location.search) {
          await supa.auth.exchangeCodeForSession(location.hash || location.search);
          cleanUrl();
          return;
        }
      } catch(_) { /* ignore, fallback below */ }

      // Fallback: setSession if tokens are present
      const q = new URLSearchParams(location.search || "");
      const h = new URLSearchParams((location.hash || "").replace(/^#/, ""));
      const access_token = h.get('access_token') || q.get('access_token');
      const refresh_token = h.get('refresh_token') || q.get('refresh_token');
      if (access_token && refresh_token) {
        try { await supa.auth.setSession({ access_token, refresh_token }); } catch(_){}
        cleanUrl();
      }
    }

    // Render header based on session
    async function renderAuthState() {
      try {
        const { data:{ session } } = await supa.auth.getSession();
        if (session?.user?.email) showSignedIn(session.user.email);
        else showSignedOut();
      } catch(_) {
        // If anything fails, don’t hang UI:
        showSignedOut();
      }
    }

    // Events
    document.getElementById('signinForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = emailInput.value.trim();
      const { error } = await supa.auth.signInWithOtp({
        email,
        options:{ emailRedirectTo: 'https://itsevtime.com/admin.html' }
      });
      if (error) alert('Login error: ' + error.message);
      else alert('Magic link sent. Check your email.');
    });

    signOutBtn.addEventListener('click', async ()=>{
      await supa.auth.signOut();
      renderAuthState();
    });

    supa.auth.onAuthStateChange(()=>renderAuthState());

    // Startup: never leave “Loading…” hanging
    (async () => {
      // 1) Attempt to parse any tokens returned by the magic link
      await processAuthFromUrl();
      // 2) Paint header now
      await renderAuthState();
      // 3) Extra paints so UI never stays stuck
      window.addEventListener('load', renderAuthState);
      setTimeout(renderAuthState, 400);
      setTimeout(renderAuthState, 1200);
    })();
  </script>
</body>
</html>
