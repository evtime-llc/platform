<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EVTime Admin</title>
  <style>
    /* Logo header styles */
    .topbar { background:#fff; border-bottom:1px solid #e7e5e4; }
    .logo-wrap { max-width:880px; margin:0 auto; padding:0 12px; }
    #site-logo { display:block; width:100%; height:auto; max-height:200px; object-fit:contain; }
    @media (max-width:600px){ #site-logo { max-height:220px; } }
    
    /* Existing admin styles */
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; }
    fieldset { border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
    label { display:block; margin: 8px 0 4px; font-weight: 600; }
    input, textarea, select, button { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .muted { color:#666; font-size: 12px; }
    .ok { color: #0a7; }
    .err { color: #c00; white-space: pre-wrap; }
    .pill { display:inline-block; background:#f4f4f4; padding:4px 8px; border-radius:999px; margin-right:6px; font-size:12px; }
    .bar { height: 6px; background:#eee; border-radius: 999px; overflow:hidden; margin-top:6px; }
    .bar > div { height: 100%; width: 0; background: #4a8; transition: width .2s; }
  </style>
</head>
<body>

  <!-- Topbar / Logo -->
  <div class="topbar">
    <div class="logo-wrap">
      <a href="/" aria-label="Go to Home">
        <img id="site-logo" src="mainlogo.svg?v=402" alt="it’s E.V.Time — Forum and MarketPlace">
      </a>
    </div>
  </div>

  <h1>EVTime — Admin</h1>
  <p class="muted">Sign in with your admin email to manage inventory. Images upload to <code>&lt;listing_id&gt;/filename.jpg</code> inside the <code>images</code> bucket.</p>

  <fieldset id="authBox">
    <legend>Authentication</legend>
    <div id="sessionInfo" class="muted">Checking session…</div>
    <div id="signinBox">
      <label>Email for magic link</label>
      <input id="email" type="email" placeholder="you@domain.com"/>
      <button id="sendLink">Send Magic Link</button>
      <div id="authMsg" class="muted"></div>
    </div>
    <button id="signout" style="display:none">Sign out</button>
  </fieldset>

  <fieldset id="createBox" style="display:none">
    <legend>Create Listing</legend>

    <div class="row3">
      <div>
        <label>Status</label>
        <select id="status">
          <option value="draft">draft</option>
          <option value="listed" selected>listed</option>
          <option value="sold">sold</option>
        </select>
      </div>
      <div>
        <label>Year</label>
        <input id="year" type="number" min="1990" max="2100" required />
      </div>
      <div>
        <label>Make</label>
        <input id="make" placeholder="Tesla"/>
      </div>
    </div>

    <div class="row3">
      <div>
        <label>Model</label>
        <input id="model" placeholder="Model 3"/>
      </div>
      <div>
        <label>Trim</label>
        <input id="trim" placeholder="Long Range"/>
      </div>
      <div>
        <label>Powertrain</label>
        <input id="powertrain" placeholder="RWD / AWD / Dual Motor"/>
      </div>
    </div>

    <div class="row3">
      <div>
        <label>Mileage</label>
        <input id="mileage" type="number" min="0"/>
      </div>
      <div>
        <label>Price (USD)</label>
        <input id="price" type="number" min="0" step="100"/>
      </div>
      <div>
        <label>City</label>
        <input id="city" placeholder="Torrance, CA"/>
      </div>
    </div>

    <div class="row3">
      <div>
        <label>Title Status</label>
        <input id="title_status" placeholder="clean / salvage / etc"/>
      </div>
      <div>
        <label>Condition</label>
        <input id="condition" placeholder="excellent / good / fair"/>
      </div>
      <div>
        <label>VIN</label>
        <input id="vin" maxlength="17" placeholder="5YJ…"/>
      </div>
    </div>

    <label>Special Features (comma-separated)</label>
    <input id="special_features" placeholder="FSD, Acceleration Boost, Tow Hitch"/>

    <label>Description</label>
    <textarea id="description" rows="5" placeholder="Clean SoCal car, one owner…"></textarea>

    <label>Photos (1+)</label>
    <input id="photos" type="file" accept="image/*" multiple />
    <div class="bar"><div id="uProg"></div></div>
    <div id="uList" class="muted" style="margin-top:6px;"></div>

    <button id="create">Create Listing</button>
    <div id="createMsg" class="muted"></div>
  </fieldset>

  <fieldset>
    <legend>Diagnostics</legend>
    <div id="diag"></div>
  </fieldset>

  <!-- Load your Supabase config -->
  <script src="/config.js"></script>
  <!-- Supabase client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = window.SUPABASE_URL || "https://tgkvhmxrftcegpryptwq.supabase.co";
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRna3ZobXhyZnRjZWdwcnlwdHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MDg3MDYsImV4cCI6MjA3NDA4NDcwNn0.3ahUcRJjrd3WoMsKDoaYXjcbM2UoltAZbQz7nVSqliQ";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: 'pkce',
        storageKey: 'evtime-auth'
      }
    });

    const $ = id => document.getElementById(id);
    const diag = (m) => { const d = $("diag"); d.innerHTML += `<div>${m}</div>`; };

    async function setSessionUI() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error) diag(`<span class="err">getSession error: ${error.message}</span>`);
      if (session) {
        $("sessionInfo").innerHTML = `<span class="ok">Signed in:</span> <span class="pill">${session.user.email}</span>`;
        $("signinBox").style.display = "none";
        $("signout").style.display = "inline-block";
        $("createBox").style.display = "block";
      } else {
        $("sessionInfo").textContent = "Not signed in.";
        $("signinBox").style.display = "block";
        $("signout").style.display = "none";
        $("createBox").style.display = "none";
      }
    }

    supabase.auth.onAuthStateChange((event) => {
      diag(`Auth event: ${event}`);
      setSessionUI();
    });

    $("sendLink").onclick = async () => {
      const email = $("email").value.trim();
      $("authMsg").textContent = "Sending magic link…";
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: "https://itsevtime.com/admin.html" }
      });
      $("authMsg").textContent = error ? `Error: ${error.message}` : "Check your email.";
    };

    $("signout").onclick = async () => {
      await supabase.auth.signOut();
      await setSessionUI();
    };

    (async () => {
      const qs = window.location.search;
      if (qs && qs.includes("code=")) {
        const { error } = await supabase.auth.exchangeCodeForSession(qs);
        if (error) diag(`<span class="err">Auth exchange error: ${error.message}</span>`);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      const hasLocal = !!localStorage.getItem('sb-' + SUPABASE_URL.replace(/^https:\/\/|\.supabase\.co$/g,'') + '-auth-token')
        || !!localStorage.getItem('evtime-auth');
      diag('Local session present: ' + hasLocal);
      await setSessionUI();
    })();

    // --- Upload helper (FIXED PATH) ---
    async function uploadPhotos(listingId, files) {
      if (!files || files.length === 0) return [];
      const uploaded = [];
      let done = 0;
      for (const file of files) {
        // store RELATIVE to the bucket: "<listingId>/<filename>"
        const relPath = `${listingId}/${Date.now()}_${file.name.replace(/\s+/g, "_")}`;
        const { error } = await supabase.storage.from("images").upload(relPath, file, { upsert: false });
        if (error) throw new Error(`Upload failed: ${error.message}`);
        uploaded.push(relPath); // save the relative path in DB
        done++;
        $("uProg").style.width = `${Math.round((done/files.length)*100)}%`;
        $("uList").innerHTML += `<code>${relPath}</code><br/>`;
      }
      return uploaded;
    }

    // --- Create listing ---
    $("create").onclick = async () => {
      $("createMsg").textContent = "";
      const files = Array.from(($("photos").files || []));
      if (files.length < 1) { $("createMsg").textContent = "Please add at least 1 photo."; return; }

      const listingId = crypto.randomUUID();

      try {
        diag("Uploading photos…");
        const imagePaths = await uploadPhotos(listingId, files);

        const payload = {
          id: listingId,
          status: $("status").value || "listed",
          year: parseInt($("year").value || "0", 10),
          make: $("make").value.trim(),
          model: $("model").value.trim(),
          trim: $("trim").value.trim(),
          mileage: parseInt($("mileage").value || "0", 10),
          special_features: $("special_features").value.trim(),
          title_status: $("title_status").value.trim(),
          condition: $("condition").value.trim(),
          description: $("description").value.trim(),
          city: $("city").value.trim(),
          vin: $("vin").value.trim(),
          price: parseInt($("price").value || "0", 10),
          powertrain: $("powertrain").value.trim(),
          images: imagePaths
        };

        diag("Inserting row…");
        const { error } = await supabase.from("listing").insert(payload);
        if (error) throw error;

        $("createMsg").innerHTML = `<span class="ok">Listing created:</span> <code>${listingId}</code>`;
        $("photos").value = "";
        $("uProg").style.width = "0%";
        $("uList").innerHTML = "";
      } catch (e) {
        $("createMsg").innerHTML = `<span class="err">${e.message}</span>`;
        diag(`<span class="err">${e.stack || e}</span>`);
      }
    };

    // --- Basic diagnostics ---
    (async () => {
      diag("Testing anon read from 'listing'…");
      const { data, error } = await supabase.from("listing").select("*").limit(1);
      if (error) diag(`<span class="err">Read error: ${error.message}</span>`); else diag("Read OK.");
      const { data: buckets, error: bErr } = await supabase.storage.listBuckets();
      if (bErr) diag(`<span class="err">Storage error: ${bErr.message}</span>`);
      else diag("Storage buckets: " + (buckets?.map(b => b.name).join(", ") || "none"));
    })();
  </script>
</body>
</html>
