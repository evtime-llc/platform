<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EVTime • Admin</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0d0d0d;
      color: #191919;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
    .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .pill { padding: 8px 12px; border-radius: 999px; cursor: pointer; }
    .btn-primary { background: #C88243; color: #fff; border: 0; }
    .btn-ghost   { background: #fff; border: 1px solid #e5e7eb; }
    .muted { color: #6b7280; }
    input[type="email"] {
      padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 10px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      padding: 18px 18px 24px;
      margin: 18px 0 40px;
    }
  </style>

  <!-- Supabase client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="wrap">
    <!-- AUTH HEADER -->
    <header id="authHeader" class="bar" style="margin:16px 0 8px;">
      <div class="bar" style="gap:10px;">
        <strong>EVTime • Admin</strong>
        <span id="authStatus" class="muted">Loading…</span>
      </div>

      <!-- Signed-out view -->
      <form id="signinForm" class="bar" style="display:none;">
        <input id="emailInput" type="email" required value="vahehr@gmail.com" />
        <button type="submit" class="pill btn-primary">Send login link</button>
      </form>

      <!-- Signed-in view -->
      <div id="signedInControls" class="bar" style="display:none;">
        <button id="signOutBtn" class="pill btn-ghost">Sign out</button>
      </div>
    </header>
    <hr>

    <section class="card">
      <h2>Add Vehicle (coming soon)</h2>
      <p class="muted">Form placeholder. First we’re just testing login/logout.</p>
    </section>
  </div>

  <script>
    // Init Supabase client
    const SUPABASE_URL = "https://tgkvhmxrftcegpryptwq.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRna3ZobXhyZnRjZWdwcnlwdHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MDg3MDYsImV4cCI6MjA3NDA4NDcwNn0.3ahUcRJjrd3WoMsKDoaYXjcbM2UoltAZbQz7nVSqliQ";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const authStatus = document.getElementById('authStatus');
    const signinForm = document.getElementById('signinForm');
    const emailInput = document.getElementById('emailInput');
    const signedInControls = document.getElementById('signedInControls');
    const signOutBtn = document.getElementById('signOutBtn');

    async function renderAuthState() {
      const { data: { session } } = await client.auth.getSession();
      if (session?.user?.email) {
        authStatus.textContent = `Signed in as ${session.user.email}`;
        signinForm.style.display = 'none';
        signedInControls.style.display = 'flex';
      } else {
        authStatus.textContent = 'Not signed in';
        signinForm.style.display = 'flex';
        signedInControls.style.display = 'none';
      }
    }

    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const { error } = await client.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: 'https://itsevtime.com/admin.html' }
      });
      if (error) alert('Login error: ' + error.message);
      else alert('Magic link sent. Check your email.');
    });

    signOutBtn.addEventListener('click', async () => {
      await client.auth.signOut();
      renderAuthState();
    });

// Handle redirect from magic link (token in URL)
client.auth.onAuthStateChange((_event, _session) => renderAuthState());
client.auth.getSession().then(() => renderAuthState());

  </script>
</body>
</html>
