<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EVTime Admin</title>
  <style>
    /* Logo header styles */
    .topbar { background:#fff; border-bottom:1px solid #e7e5e4; }
    .logo-wrap { max-width:880px; margin:0 auto; padding:0 12px; }
    #site-logo { display:block; width:100%; height:auto; max-height:200px; object-fit:contain; }
    @media (max-width:600px){ #site-logo { max-height:220px; } }

    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 24px; max-width: 1000px; margin: 0 auto; }
    fieldset { border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
    legend { font-weight: 800; }
    label { display:block; margin: 8px 0 4px; font-weight: 600; }
    input, textarea, select, button { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .muted { color:#666; font-size: 12px; }
    .ok { color: #0a7; }
    .err { color: #c00; white-space: pre-wrap; }
    .pill { display:inline-block; background:#f4f4f4; padding:4px 8px; border-radius:999px; margin-right:6px; font-size:12px; }
    .bar { height: 6px; background:#eee; border-radius: 999px; overflow:hidden; margin-top:6px; }
    .bar > div { height: 100%; width: 0; background: #4a8; transition: width .2s; }

    /* Manage table */
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid #eee; vertical-align: middle; }
    th { text-align:left; font-size:13px; color:#555; }
    td .title { font-weight:800; }
    td .sub { font-size:12px; color:#666; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 10px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn.danger { border-color:#f3c; color:#a00 }
    .badge { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:800; display:inline-block; }
    .badge.live { background:#e6f7ef; color:#0a7; border:1px solid #bfead3; }
    .badge.sold { background:#f7e6e6; color:#a00; border:1px solid #f0caca; }
    .badge.ev { background:#e8f0ff; color:#1d4ed8; border:1px solid #c7dcff; }
    .badge.other { background:#fff7e6; color:#b45309; border:1px solid #ffe5b4; }

    /* Cover thumbnail */
    .thumb { width: 72px; height: 54px; object-fit: cover; border-radius:8px; background:#000; display:block; }

    /* Modal */
    .modal { position: fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:9999; }
    .modal.open { display:flex; }
    .modal-card { background:#fff; width: min(860px, 95vw); max-height: 90vh; overflow:auto; border-radius:12px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.2) }
    .modal-header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .modal-title { font-weight:900; font-size:18px; }
    .close { border:none; background:#eee; border-radius:999px; width:34px; height:34px; font-size:18px; cursor:pointer; }

    .rad-group { display:flex; gap:12px; flex-wrap: wrap; }
    .rad-group label { display:flex; align-items:center; gap:6px; font-weight:600; }
    .rad-group input { width:auto; }

    .two { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:800px){ .two { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <!-- Topbar / Logo -->
  <div class="topbar">
    <div class="logo-wrap">
      <a href="/" aria-label="Go to Home">
        <img id="site-logo" src="mainlogo.svg?v=402" alt="it’s E.V.Time — Forum and MarketPlace">
      </a>
    </div>
  </div>

  <h1>EVTime — Admin</h1>
  <p class="muted">Sign in with your admin email to manage inventory. Images upload to <code>&lt;listing_id&gt;/filename.jpg</code> inside the <code>images</code> bucket.</p>

  <fieldset id="authBox">
    <legend>Authentication</legend>
    <div id="sessionInfo" class="muted">Checking session…</div>
    <div id="signinBox">
      <label>Email for magic link</label>
      <input id="email" type="email" placeholder="you@domain.com"/>
      <button id="sendLink" class="btn">Send Magic Link</button>
      <div id="authMsg" class="muted"></div>
    </div>
    <button id="signout" class="btn" style="display:none">Sign out</button>
  </fieldset>

  <fieldset id="createBox" style="display:none">
    <legend>Create Listing</legend>

    <div class="row3">
      <div>
        <label>Status</label>
        <div class="rad-group">
          <label><input type="radio" name="c_status" value="live" checked> Live</label>
          <label><input type="radio" name="c_status" value="sold"> Sold</label>
        </div>
      </div>
      <div>
        <label>Vehicle Type</label>
        <div class="rad-group">
          <label><input type="radio" name="c_vehicle_type" value="ev" checked> EV</label>
          <label><input type="radio" name="c_vehicle_type" value="other"> Other</label>
        </div>
      </div>
      <div>
        <label>Price (USD)</label>
        <input id="c_price" type="number" min="0" step="100"/>
      </div>
    </div>

    <div class="row3">
      <div><label>Year</label><input id="c_year" type="number" min="1990" max="2100" /></div>
      <div><label>Make</label><input id="c_make" placeholder="Tesla"/></div>
      <div><label>Model</label><input id="c_model" placeholder="Model 3"/></div>
    </div>

    <div class="row3">
      <div><label>Trim</label><input id="c_trim" placeholder="Long Range"/></div>
      <div><label>Powertrain</label><input id="c_powertrain" placeholder="RWD / AWD / Dual Motor"/></div>
      <div><label>Mileage</label><input id="c_mileage" type="number" min="0"/></div>
    </div>

    <div class="row3">
      <div>
        <label>Title Status</label>
        <div class="rad-group">
          <label><input type="radio" name="c_title_status" value="Clean" checked> Clean</label>
          <label><input type="radio" name="c_title_status" value="Other"> Other</label>
        </div>
      </div>
      <div>
        <label>Condition</label>
        <div class="rad-group">
          <label><input type="radio" name="c_condition" value="Excellent" checked> Excellent</label>
          <label><input type="radio" name="c_condition" value="Good"> Good</label>
          <label><input type="radio" name="c_condition" value="Fair"> Fair</label>
        </div>
      </div>
      <div><label>City</label><input id="c_city" placeholder="Torrance, CA"/></div>
    </div>

    <label>Special Features (comma-separated)</label>
    <input id="c_special_features" placeholder="FSD, Acceleration Boost, Tow Hitch"/>

    <label>Description</label>
    <textarea id="c_description" rows="4" placeholder="Clean SoCal car, one owner…"></textarea>

    <div class="two">
      <div>
        <label>Cover Photo (required)</label>
        <input id="c_cover" type="file" accept="image/*"/>
      </div>
      <div>
        <label>Gallery Photos (optional, up to 9)</label>
        <input id="c_gallery" type="file" accept="image/*" multiple/>
      </div>
    </div>
    <div class="bar"><div id="uProgCreate"></div></div>
    <div id="uListCreate" class="muted" style="margin-top:6px;"></div>

    <button id="create" class="btn">Create Listing</button>
    <div id="createMsg" class="muted"></div>
  </fieldset>

  <fieldset id="manageBox" style="display:none">
    <legend>Inventory</legend>
    <div id="tblWrap">
      <table>
        <thead>
          <tr>
            <th>Cover</th>
            <th>Status</th>
            <th>Vehicle</th>
            <th>City / Price</th>
            <th>Type</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbl"></tbody>
      </table>
      <div id="emptyMsg" class="muted" style="display:none">No rows.</div>
    </div>
  </fieldset>

  <fieldset>
    <legend>Diagnostics</legend>
    <div id="diag"></div>
  </fieldset>

  <!-- Edit Modal -->
  <div id="editModal" class="modal" aria-modal="true" role="dialog">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Edit Listing</div>
        <button class="close" id="editClose" aria-label="Close">✕</button>
      </div>
      <div id="editBody">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <!-- Config + Supabase client -->
  <script src="/config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = (window.SUPABASE_URL || "https://tgkvhmxrftcegpryptwq.supabase.co").trim();
    const SUPABASE_ANON_KEY = (window.SUPABASE_ANON_KEY || "").trim();

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: 'pkce',
        storageKey: 'evtime-auth'
      }
    });

    const $ = id => document.getElementById(id);
    const diag = (m) => { const d = $("diag"); d.innerHTML += `<div>${m}</div>`; };

    // ---------- Image helpers (same robustness as Share)
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function parseImages(images){
      if (!images) return [];
      if (Array.isArray(images)) return images;
      if (typeof images === 'string'){
        const s = images.trim();
        if (s.startsWith('[')) { try{ return JSON.parse(s)||[] } catch { return [] } }
        return s.split(',').map(v=>v.trim()).filter(Boolean);
      }
      return [];
    }
    function normalize(path){
      return String(path||'').trim().replace(/^\/+/, '').replace(/^(images\/)+/i,'');
    }
    function publicImageUrls(path){
      let s = String(path||'').trim().replace(/^\/+/, '');
      if (!s) return [];
      const candidates = [];
      if (/^images\/images\//i.test(s)) candidates.push(s.replace(/^images\/images\//i,'images/'));
      candidates.push(s);
      candidates.push(s.replace(/^images\//i,''));
      if (!/^images\//i.test(s)) candidates.push('images/' + s);
      const uniq = [...new Set(candidates)];
      return uniq.map(p => supabase.storage.from('images').getPublicUrl(p).data?.publicUrl || null).filter(Boolean);
    }
    function chooseUrl(path){
      const urls = publicImageUrls(path);
      return urls[0] || null;
    }

    // ---- Auth UI
    async function setSessionUI() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error) diag(`<span class="err">getSession error: ${error.message}</span>`);
      if (session) {
        const email = session.user?.email || "";
        // Restrict admin access
        if (email.toLowerCase() !== "vahehr@gmail.com") {
          $("sessionInfo").innerHTML = `<span class="err">Access denied for ${email}</span>`;
          await supabase.auth.signOut();
          $("signinBox").style.display = "block";
          $("signout").style.display = "none";
          $("createBox").style.display = "none";
          $("manageBox").style.display = "none";
          return;
        }
        $("sessionInfo").innerHTML = `<span class="ok">Signed in:</span> <span class="pill">${email}</span>`;
        $("signinBox").style.display = "none";
        $("signout").style.display = "inline-block";
        $("createBox").style.display = "block";
        $("manageBox").style.display = "block";
        await refreshListings(); // ensure table shows latest after signin
      } else {
        $("sessionInfo").textContent = "Not signed in.";
        $("signinBox").style.display = "block";
        $("signout").style.display = "none";
        $("createBox").style.display = "none";
        $("manageBox").style.display = "none";
      }
    }

    supabase.auth.onAuthStateChange((event)=>{ diag(`Auth event: ${event}`); setSessionUI(); });

    $("sendLink").onclick = async () => {
      const email = $("email").value.trim();
      $("authMsg").textContent = "Sending magic link...";
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: "https://itsevtime.com/admin.html" }
      });
      $("authMsg").textContent = error ? `Error: ${error.message}` : "Check your email.";
    };

    $("signout").onclick = async () => {
      await supabase.auth.signOut();
      await setSessionUI();
    };

    (async () => {
      // Handle PKCE return
      const qs = window.location.search;
      if (qs && qs.includes("code=")) {
        const { error } = await supabase.auth.exchangeCodeForSession(qs);
        if (error) diag(`<span class="err">Auth exchange error: ${error.message}</span>`);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      const hasLocal = !!localStorage.getItem('sb-' + SUPABASE_URL.replace(/^https:\/\/|\.supabase\.co$/g,'') + '-auth-token')
        || !!localStorage.getItem('evtime-auth');
      diag('Local session present: ' + hasLocal);
      await setSessionUI();
    })();

    // ---- Grouping & ordering (same rules as Share)
    function blockKey(row){
      const status = String(row.status||'').toLowerCase();
      if (status === 'sold') return 'sold';
      const vt = String(row.vehicle_type || 'ev').toLowerCase();
      const make = String(row.make || '').trim().toLowerCase();
      if (vt === 'ev'){
        if (make === 'tesla') return 'live_tesla';
        return 'live_other_ev';
      }
      return 'live_other';
    }
    function byPosThenDate(a,b){
      const pa = Number(a.position ?? 0), pb = Number(b.position ?? 0);
      if (pb !== pa) return pb - pa;
      const ad = new Date(a.updated_at || a.created_at || 0).getTime();
      const bd = new Date(b.updated_at || b.created_at || 0).getTime();
      return bd - ad;
    }

    // ---- Uploads
    async function uploadFilesTo(listingId, files, progEl, listEl){
      if (!files || files.length === 0) return [];
      const uploaded = [];
      let done = 0;
      for (const file of files) {
        const relPath = `${listingId}/${Date.now()}_${file.name.replace(/\s+/g, "_")}`;
        const { error } = await supabase.storage.from("images").upload(relPath, file, { upsert: false });
        if (error) throw new Error(`Upload failed: ${error.message}`);
        uploaded.push(relPath);
        done++;
        if (progEl) progEl.style.width = `${Math.round((done/files.length)*100)}%`;
        if (listEl) listEl.innerHTML += `<code>${relPath}</code><br/>`;
      }
      return uploaded;
    }

    // ---- CREATE
    $("create").onclick = async () => {
      $("createMsg").textContent = "";
      const cover = $("c_cover").files?.[0];
      if (!cover) { $("createMsg").textContent = "Please add a cover photo."; return; }

      const listingId = crypto.randomUUID();
      try {
        const coverPaths = await uploadFilesTo(listingId, [cover], $("uProgCreate"), $("uListCreate"));
        const galleryFiles = Array.from($("c_gallery").files || []);
        const galleryPaths = galleryFiles.length ? await uploadFilesTo(listingId, galleryFiles, $("uProgCreate"), $("uListCreate")) : [];

        const payload = {
          id: listingId,
          status: document.querySelector('input[name="c_status"]:checked')?.value || "live",
          vehicle_type: document.querySelector('input[name="c_vehicle_type"]:checked')?.value || "ev",
          year: parseInt($("c_year").value || "0", 10),
          make: $("c_make").value.trim(),
          model: $("c_model").value.trim(),
          trim: $("c_trim").value.trim(),
          powertrain: $("c_powertrain").value.trim(),
          mileage: parseInt($("c_mileage").value || "0", 10),
          title_status: document.querySelector('input[name="c_title_status"]:checked')?.value || "Clean",
          condition: document.querySelector('input[name="c_condition"]:checked')?.value || "Excellent",
          city: $("c_city").value.trim(),
          vin: $("c_vin")?.value?.trim?.() || "",
          price: parseInt($("c_price").value || "0", 10),
          special_features: $("c_special_features").value.trim(),
          description: $("c_description").value.trim(),
          images: [ ...coverPaths, ...galleryPaths ],
          position: Date.now()
        };

        const { error } = await supabase.from("listing").insert(payload);
        if (error) throw error;

        $("createMsg").innerHTML = `<span class="ok">Listing created:</span> <code>${listingId}</code>`;
        $("c_cover").value = ""; $("c_gallery").value = "";
        $("uProgCreate").style.width = "0%"; $("uListCreate").innerHTML = "";
        await refreshListings(); // reflect DB immediately
      } catch (e) {
        $("createMsg").innerHTML = `<span class="err">${e.message}</span>`;
        diag(`<span class="err">${e.stack || e}</span>`);
      }
    };

    // ---- ADMIN TABLE
    async function fetchOrdered(statusVal){
      return supabase
        .from('listing')
        .select('*')
        .eq('status', statusVal)
        .order('position', { ascending:false, nullsFirst:false })
        .order('updated_at', { ascending:false, nullsFirst:false })
        .limit(1000);
    }

    async function refreshListings(){
      const [liveRes, soldRes] = await Promise.all([fetchOrdered('live'), fetchOrdered('sold')]);
      if (liveRes.error || soldRes.error){
        diag(`<span class="err">Load error: ${(liveRes.error || soldRes.error).message}</span>`);
        $("tbl").innerHTML = "";
        $("emptyMsg").style.display = "block";
        return;
      }
      const live = liveRes.data || [];
      const sold = soldRes.data || [];

      const live_tesla = [], live_other_ev = [], live_other = [];
      for (const r of live){
        const k = blockKey(r);
        if (k === 'live_tesla') live_tesla.push(r);
        else if (k === 'live_other_ev') live_other_ev.push(r);
        else live_other.push(r);
      }
      live_tesla.sort(byPosThenDate);
      live_other_ev.sort(byPosThenDate);
      live_other.sort(byPosThenDate);
      sold.sort(byPosThenDate);

      const rows = [...live_tesla, ...live_other_ev, ...live_other, ...sold];
      renderTable(rows);
    }

    function renderTable(rows){
      const tb = $("tbl");
      if (!rows.length){ tb.innerHTML = ""; $("emptyMsg").style.display = "block"; return; }
      $("emptyMsg").style.display = "none";
      tb.innerHTML = rows.map(r=>{
        const status = String(r.status||'').toLowerCase();
        const vt = String(r.vehicle_type||'ev').toLowerCase();
        const badgeS = `<span class="badge ${status}">${status.toUpperCase()}</span>`;
        const badgeT = `<span class="badge ${vt}">${vt.toUpperCase()}</span>`;
        const title = `${r.year||''} ${r.make||''} ${r.model||''} ${r.trim||''}`.trim();
        const price = (r.price!=null && r.price!=='') ? `$${Number(r.price).toLocaleString()}` : '';

        // Build cover thumbnail URL safely
        const paths = parseImages(r.images).map(normalize);
        const firstPath = paths[0] || "";
        const coverUrl = firstPath ? (chooseUrl(firstPath) || 'og-card.png') : 'og-card.png';

        return `
          <tr data-id="${r.id}">
            <td><img class="thumb" src="${esc(coverUrl)}" alt=""></td>
            <td>${badgeS}</td>
            <td>
              <div class="title">${title || '(no title)'}</div>
              <div class="sub">VIN: ${r.vin||''}</div>
            </td>
            <td>
              <div>${r.city||''}</div>
              <div class="sub">${price}</div>
            </td>
            <td>${badgeT}</td>
            <td class="actions">
              <button class="btn" data-act="up">↑ Up</button>
              <button class="btn" data-act="down">↓ Down</button>
              <button class="btn" data-act="edit">✎ Edit</button>
              <button class="btn danger" data-act="delete">🗑 Delete</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    // ---- Move (swap within block), then refresh
    async function moveWithinBlock(id, dir){
      const { data, error } = await supabase
        .from('listing')
        .select('*')
        .limit(1000);
      if (error) throw error;

      const rows = data.slice();
      const blocks = { live_tesla:[], live_other_ev:[], live_other:[], sold:[] };
      rows.forEach(r => blocks[blockKey(r)].push(r));
      Object.keys(blocks).forEach(k => blocks[k].sort(byPosThenDate));

      let blockName = null, idx = -1;
      for (const k of ['live_tesla','live_other_ev','live_other','sold']){
        const arr = blocks[k];
        const i = arr.findIndex(x => x.id === id);
        if (i !== -1){ blockName = k; idx = i; break; }
      }
      if (blockName == null) return;

      const arr = blocks[blockName];
      const nIdx = idx + (dir === 'up' ? -1 : 1);
      if (nIdx < 0 || nIdx >= arr.length) return;

      const a = arr[idx], b = arr[nIdx];
      const posA = Number(a.position ?? 0), posB = Number(b.position ?? 0);

      const u1 = supabase.from('listing').update({ position: posB }).eq('id', a.id);
      const u2 = supabase.from('listing').update({ position: posA }).eq('id', b.id);
      const [r1, r2] = await Promise.all([u1, u2]);
      if (r1.error || r2.error) throw (r1.error || r2.error);

      await refreshListings();
    }

    // ---- Delete (hard delete)
    async function deleteListing(id){
      if (!confirm("Delete this listing and all its photos? This cannot be undone.")) return;
      try{
        const { data: files, error: listErr } = await supabase.storage.from('images').list(id, { limit: 1000 });
        if (listErr) diag(`<span class="err">List files error: ${listErr.message}</span>`);
        if (files?.length){
          const paths = files.map(f => `${id}/${f.name}`);
          const { error: delErr } = await supabase.storage.from('images').remove(paths);
          if (delErr) diag(`<span class="err">Remove files error: ${delErr.message}</span>`);
        }
        const { error } = await supabase.from('listing').delete().eq('id', id);
        if (error) throw error;
      } catch(e){
        diag(`<span class="err">Delete failed: ${e.message}</span>`);
      }
      await refreshListings();
    }

    // ---- Edit modal
    const editModal = $("editModal");
    const editClose = $("editClose");
    editClose.onclick = ()=> editModal.classList.remove('open');
    window.addEventListener('keydown', (e)=>{ if (e.key==='Escape') editModal.classList.remove('open'); });
    editModal.addEventListener('click', (e)=>{ if (e.target === editModal) editModal.classList.remove('open'); });

    function editFormHTML(row){
      const radio = (name, val, cur, label) => `
        <label><input type="radio" name="${name}" value="${val}" ${String(cur).toLowerCase()===String(val).toLowerCase()?'checked':''}> ${label}</label>
      `;
      return `
        <div class="row3">
          <div>
            <label>Status</label>
            <div class="rad-group">
              ${radio('e_status','live',row.status,'Live')}
              ${radio('e_status','sold',row.status,'Sold')}
            </div>
          </div>
          <div>
            <label>Vehicle Type</label>
            <div class="rad-group">
              ${radio('e_vehicle_type','ev',row.vehicle_type||'ev','EV')}
              ${radio('e_vehicle_type','other',row.vehicle_type,'Other')}
            </div>
          </div>
          <div>
            <label>Price (USD)</label>
            <input id="e_price" type="number" min="0" step="100" value="${row.price ?? ''}"/>
          </div>
        </div>

        <div class="row3">
          <div><label>Year</label><input id="e_year" type="number" min="1990" max="2100" value="${row.year ?? ''}"/></div>
          <div><label>Make</label><input id="e_make" value="${(row.make||'')}"/></div>
          <div><label>Model</label><input id="e_model" value="${(row.model||'')}"/></div>
        </div>

        <div class="row3">
          <div><label>Trim</label><input id="e_trim" value="${(row.trim||'')}"/></div>
          <div><label>Powertrain</label><input id="e_powertrain" value="${(row.powertrain||'')}"/></div>
          <div><label>Mileage</label><input id="e_mileage" type="number" min="0" value="${row.mileage ?? ''}"/></div>
        </div>

        <div class="row3">
          <div>
            <label>Title Status</label>
            <div class="rad-group">
              ${radio('e_title_status','Clean',row.title_status,'Clean')}
              ${radio('e_title_status','Other',row.title_status,'Other')}
            </div>
          </div>
          <div>
            <label>Condition</label>
            <div class="rad-group">
              ${radio('e_condition','Excellent',row.condition,'Excellent')}
              ${radio('e_condition','Good',row.condition,'Good')}
              ${radio('e_condition','Fair',row.condition,'Fair')}
            </div>
          </div>
          <div><label>City</label><input id="e_city" value="${(row.city||'')}"/></div>
        </div>

        <label>Special Features (comma-separated)</label>
        <input id="e_special_features" value="${(row.special_features||'')}"/>

        <label>Description</label>
        <textarea id="e_description" rows="4">${(row.description||'')}</textarea>

        <div class="two">
          <div>
            <label>Replace Cover (optional)</label>
            <input id="e_cover" type="file" accept="image/*"/>
          </div>
          <div>
            <label>Add Gallery Photos (optional)</label>
            <input id="e_gallery" type="file" accept="image/*" multiple/>
          </div>
        </div>
        <div class="bar"><div id="uProgEdit"></div></div>
        <div id="uListEdit" class="muted" style="margin-top:6px;"></div>

        <div style="display:flex; gap:12px; margin-top:12px;">
          <button id="e_save" class="btn">Save changes</button>
          <button id="e_cancel" class="btn">Cancel</button>
        </div>
        <div id="e_msg" class="muted" style="margin-top:6px;"></div>
      `;
    }

    async function openEdit(id){
      const { data, error } = await supabase.from('listing').select('*').eq('id', id).single();
      if (error){ diag(`<span class="err">Load row error: ${error.message}</span>`); return; }
      const body = $("editBody");
      body.innerHTML = editFormHTML(data);
      editModal.classList.add('open');

      $("e_cancel").onclick = ()=> editModal.classList.remove('open');

      $("e_save").onclick = async () => {
        $("e_msg").textContent = "Saving…";
        try{
          const cover = $("e_cover").files?.[0] || null;
          const galFiles = Array.from($("e_gallery").files || []);

          let newCoverPath = null;
          let newGalleryPaths = [];
          if (cover){
            const up = await uploadFilesTo(id, [cover], $("uProgEdit"), $("uListEdit"));
            newCoverPath = up[0] || null;
          }
          if (galFiles.length){
            newGalleryPaths = await uploadFilesTo(id, galFiles, $("uProgEdit"), $("uListEdit"));
          }

          let images = Array.isArray(data.images)
            ? data.images.slice()
            : (typeof data.images === 'string' && data.images.trim().startsWith('[') ? (JSON.parse(data.images)||[]) : (data.images||'').split(',').map(s=>s.trim()).filter(Boolean));

          if (!Array.isArray(images)) images = [];
          if (newCoverPath){
            images = [newCoverPath, ...images.filter(p => p !== newCoverPath)];
          }
          if (newGalleryPaths.length){
            images = [...images, ...newGalleryPaths];
          }

          const patch = {
            status: document.querySelector('input[name="e_status"]:checked')?.value || data.status,
            vehicle_type: document.querySelector('input[name="e_vehicle_type"]:checked')?.value || data.vehicle_type,
            price: Number.isFinite(parseInt($("e_price").value,10)) ? parseInt($("e_price").value,10) : data.price,
            year: Number.isFinite(parseInt($("e_year").value,10)) ? parseInt($("e_year").value,10) : data.year,
            make: $("e_make").value.trim() || data.make,
            model: $("e_model").value.trim() || data.model,
            trim: $("e_trim").value.trim() || data.trim,
            powertrain: $("e_powertrain").value.trim() || data.powertrain,
            mileage: Number.isFinite(parseInt($("e_mileage").value,10)) ? parseInt($("e_mileage").value,10) : data.mileage,
            title_status: document.querySelector('input[name="e_title_status"]:checked')?.value || data.title_status,
            condition: document.querySelector('input[name="e_condition"]:checked')?.value || data.condition,
            city: $("e_city").value.trim() || data.city,
            special_features: $("e_special_features").value.trim() || data.special_features,
            description: $("e_description").value.trim() || data.description,
            images: images
          };

          const { error: upErr } = await supabase.from('listing').update(patch).eq('id', id);
          if (upErr) throw upErr;

          $("e_msg").innerHTML = `<span class="ok">Saved.</span>`;
          editModal.classList.remove('open');
          await refreshListings();
        }catch(e){
          $("e_msg").innerHTML = `<span class="err">${e.message}</span>`;
          diag(`<span class="err">${e.stack || e}</span>`);
        }
      };
    }

    // ---- Table actions
    $("tbl").addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;
      const tr = e.target.closest('tr[data-id]');
      if (!tr) return;
      const id = tr.getAttribute('data-id');
      const act = btn.getAttribute('data-act');
      try{
        if (act === 'up') { await moveWithinBlock(id, 'up'); }
        else if (act === 'down') { await moveWithinBlock(id, 'down'); }
        else if (act === 'edit') { await openEdit(id); }
        else if (act === 'delete') { await deleteListing(id); }
      }catch(err){
        diag(`<span class="err">Action error: ${err.message}</span>`);
      }
    });

    // ---- Basic diagnostics
    (async () => {
      diag("Testing anon read from 'listing'…");
      const { data, error } = await supabase.from("listing").select("*").limit(1);
      if (error) diag(`<span class="err">Read error: ${error.message}</span>`); else diag("Read OK.");
      const { data: buckets, error: bErr } = await supabase.storage.listBuckets();
      if (bErr) diag(`<span class="err">Storage error: ${bErr.message}</span>`);
      else diag("Storage buckets: " + (buckets?.map(b => b.name).join(", ") || "none"));
    })();
  </script>
</body>
</html>
