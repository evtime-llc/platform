<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inventory Admin • it’s E.V.Time</title>
<meta name="theme-color" content="#0b0a09"/>

<style>
:root{ --bg:#0b0a09; --card:#fff; --text:#1c1917; --muted:#78716c; --line:#e7e5e4; --cta:#c98c5b; --ctaDark:#9e6d45 }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}

/* Standardized header */
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.logo-wrap{max-width:880px;margin:0 auto;padding:0 12px}
.logo-wrap a{display:block}
#site-logo{display:block;width:100%;height:auto;max-height:200px;object-fit:contain}
@media (max-width:600px){ #site-logo{max-height:220px} }

/* Standard page width */
.wrap{max-width:880px;margin:0 auto;padding:12px}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0}
h1,h2{margin:6px 0 8px}
.small{font-size:12px;color:var(--muted)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1;min-width:220px}
label{display:block;font-size:12px;color:#44403c;margin:8px 0 4px}
input[type="text"],input[type="number"],textarea{
  width:100%;height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:16px
}
textarea{height:auto;min-height:80px;padding:10px 12px}
input::placeholder,textarea::placeholder{color:#9a948f}
button{height:42px;padding:0 14px;border:1px solid #d6d3d1;border-radius:12px;background:#fff;cursor:pointer;transition:.15s}
button.primary{background:var(--cta);color:#0b0a09;border-color:var(--cta);font-weight:800;box-shadow:0 3px 10px rgba(201,140,91,.28)}
button.primary:hover{background:var(--ctaDark);color:#fff}
button.warn{background:#fee2e2;border-color:#fecaca}
button.icon{width:42px}

hr.sep{border:0;border-top:1px dashed #e7e5e4;margin:10px 0}

/* inventory list */
.list{display:flex;flex-direction:column;gap:8px}
.item{display:flex;align-items:center;gap:10px;border:1px dashed #e7e5e4;border-radius:12px;padding:8px;background:#fafafa}
.item img{width:92px;height:69px;object-fit:cover;border-radius:10px;background:#e5e7eb}
.meta{flex:1;min-width:0}
.title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{font-size:12px;color:#57534e}
.btns{display:flex;gap:6px}
.kv{font-variant-numeric:tabular-nums}

.notice{background:#f8fafc;border:1px solid #e7e5e4;border-radius:10px;padding:8px 10px;margin:8px 0}
.ok{color:#16a34a}.err{color:#b91c1c}
.hidden{display:none}

input[type="file"]{display:none}
.file-label{display:inline-flex;align-items:center;gap:8px;border:1px dashed #d6d3d1;border-radius:12px;padding:0 12px;height:42px;background:#fff;cursor:pointer}

.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media (max-width:720px){ .grid3{grid-template-columns:1fr} }
</style>
</head>
<body>

<!-- Header -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="/" aria-label="Go to Home">
      <img id="site-logo" src="mainlogo.svg?v=402" alt="it’s E.V.Time — Forum and MarketPlace">
    </a>
  </div>
</div>

<div class="wrap">

  <!-- Login placeholder -->
  <div class="card" id="loginCard">
    <h1>Admin Login</h1>
    <div class="small">Enter your email to receive a magic link.</div>
    <input id="loginEmail" type="text" placeholder="you@example.com" style="margin:8px 0;width:100%">
    <button id="loginBtn" class="primary">Send Magic Link</button>
    <div id="loginMsg" class="small"></div>
  </div>

  <!-- Add / Edit -->
  <div class="card hidden" id="adminCard">
    <h1 id="formTitle">Add Vehicle</h1>
    <div class="small">Fast add: drop photos, fill a few fields, save. Photos are auto-resized for web.</div>

    <!-- form fields unchanged for now -->
    <!-- ... KEEPING YOUR EXISTING FORM AND INVENTORY UI ... -->
    <div class="small">[Form UI placeholder — still here, will activate after login]</div>
  </div>

</div>

<!-- Supabase client -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
/* ====== Supabase Init ====== */
const SUPABASE_URL = "https://tgkvhmxrftcegpryptwq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRna3ZobXhyZnRjZWdwcnlwdHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MDg3MDYsImV4cCI6MjA3NDA4NDcwNn0.3ahUcRJjrd3WoMsKDoaYXjcbM2UoltAZbQz7nVSqliQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ====== Simple login UI ====== */
const loginCard = document.getElementById("loginCard");
const adminCard = document.getElementById("adminCard");
const loginBtn = document.getElementById("loginBtn");
const loginEmail = document.getElementById("loginEmail");
const loginMsg = document.getElementById("loginMsg");

loginBtn.onclick = async () => {
  loginMsg.textContent = "Sending magic link…";
  const { error } = await supabase.auth.signInWithOtp({
    email: loginEmail.value,
    options: { emailRedirectTo: "https://itsevtime.com/admin.html" }
  });
  if (error) {
    loginMsg.textContent = "Error: " + error.message;
  } else {
    loginMsg.textContent = "Check your email for the login link.";
  }
};

/* ====== Session check ====== */
async function checkSession(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    loginCard.classList.add("hidden");
    adminCard.classList.remove("hidden");
  }
}
checkSession();
</script>
</body>
</html>
