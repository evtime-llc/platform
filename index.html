<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>it’s E.V.Time — Forum and MarketPlace</title>
<meta name="theme-color" content="#0b0a09"/>

<meta property="og:title" content="it’s E.V.Time — Forum and MarketPlace" />
<meta property="og:description" content="Sell, trade, or browse cars. Simple and friendly." />
<meta property="og:image" content="https://itsevtime.com/og-card.png" />
<meta property="og:url" content="https://itsevtime.com/" />
<meta name="twitter:card" content="summary_large_image" />

<style>
:root{
  --bg:#0b0a09; --card:#ffffff; --text:#1c1917; --muted:#78716c; --line:#e7e5e4;
  --copper:#c98c5b; --copper-dark:#9e6d45; --copper-soft:#f5eae0; --cta:#c98c5b; --ctaText:#0b0a09;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
.wrap{max-width:880px;margin:0 auto;padding:12px}

/* Header */
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.logo-wrap{max-width:880px;margin:0 auto;padding:0 12px}
.logo-wrap a{display:block}
#site-logo{display:block;width:100%;height:auto;max-height:200px;object-fit:contain}
@media (max-width:600px){ #site-logo{max-height:220px} }

/* HERO (full-bleed image with CTAs on top) */
.hero-hero{
  position:relative; width:100%; min-height:58vh;
  background:url("hero_text_centered_highest.png") center/cover no-repeat;
  border-bottom:1px solid var(--line);
}
.hero-hero::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(11,10,9,0.10) 0%, rgba(11,10,9,0.25) 60%, rgba(11,10,9,0.35) 100%);
  pointer-events:none;
}
.hero-overlay{
  position:relative; z-index:1;
  display:flex; align-items:flex-end; justify-content:center;
  min-height:58vh; padding:18px 12px 28px;
}
.hero-ctas{
  display:flex; gap:10px; flex-wrap:wrap;
  background:rgba(255,255,255,0.75);
  backdrop-filter:saturate(120%) blur(6px);
  border:1px solid var(--line); border-radius:16px;
  padding:10px;
}

/* Buttons */
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:46px;padding:0 16px;border-radius:14px;border:1px solid var(--line);
  background:#fff;color:var(--text);text-decoration:none;font-weight:700;transition:.15s ease
}
.btn.primary{
  background:var(--cta);color:var(--ctaText);border-color:transparent;
  box-shadow:0 4px 14px rgba(201,140,91,.35)
}
.btn.primary:hover{background:var(--copper-dark);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--copper);color:var(--copper)}
.btn.ghost:hover{background:var(--copper-soft)}
.btn:hover{transform:translateY(-1px)}
@media (min-width: 720px){
  .btn{height:50px;padding:0 18px}
  .btn.primary{box-shadow:0 6px 18px rgba(201,140,91,.35)}
}

/* Footer */
.footer{border-top:1px solid var(--line);background:#fff}
.footer .wrap{padding:16px 12px;color:#44403c;font-size:13px}
.footer a{color:var(--copper);text-decoration:none;border-bottom:1px dotted var(--copper)}
.footer a:hover{border-bottom-style:solid}
.right{float:right}
.clearfix::after{content:"";display:block;clear:both}
</style>
</head>
<body>

<!-- Topbar / Logo -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="/" aria-label="Go to Home">
      <img id="site-logo" src="mainlogo.svg?v=402" alt="it’s E.V.Time — Forum and MarketPlace">
    </a>
  </div>
</div>

<!-- HERO -->
<section class="hero-hero" aria-label="EVTime hero">
  <div class="hero-overlay">
    <div class="hero-ctas" role="navigation" aria-label="Primary actions">
      <a class="btn primary" href="./sell.html">Sell your car</a>
      <a class="btn ghost" href="./share.html">Browse inventory</a>
      <a class="btn ghost" href="./about.html">How it works / Why E.V.Time</a>
    </div>
  </div>
</section>

<!-- Optional: spacer section if you want breathing room below hero -->
<div class="wrap" style="padding:18px 12px;color:#e7e5e4;">
  <!-- You can add a short value line here later if desired -->
</div>

<footer class="footer">
  <div class="wrap clearfix">
    <div>© <span id="yr"></span> E.V.Time</div>
    <div class="right"><a href="./legal.html">Legal &amp; Disclosures</a></div>
  </div>
</footer>

<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
