<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.googletagmanager.com www.clarity.ms client.crisp.chat; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.supabase.co www.googletagmanager.com; connect-src 'self' *.supabase.co www.google-analytics.com region1.google-analytics.com *.clarity.ms client.crisp.chat wss://client.relay.crisp.chat; font-src 'self' client.crisp.chat; frame-src 'none';"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reset Password — E.V.Time</title>
<meta name="description" content="Set a new password for your EVTime account."/>
<meta name="theme-color" content="#0b0a09"/>
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>

<meta property="og:title" content="Reset Password — E.V.Time"/>
<meta property="og:description" content="Set a new password for your EVTime account."/>
<meta property="og:image" content="https://itsevtime.com/og-card.png"/>
<meta property="og:url" content="https://itsevtime.com/reset-password.html"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>

<link rel="stylesheet" href="./styles.css"/>

<style>
#header-placeholder{position:sticky;top:0;z-index:100}
.reset-wrap{max-width:440px;margin:0 auto;padding:48px 16px 64px}
.reset-card{background:var(--bg-light);border:1px solid var(--line);border-radius:14px;padding:32px 28px}
.reset-card h1{margin:0 0 6px;font-size:24px;font-weight:900;color:var(--text);letter-spacing:-0.02em}
.reset-card .subtitle{font-size:14px;color:#78716c;margin:0 0 24px}
label{display:block;font-size:13px;color:#44403c;margin:12px 0 4px;font-weight:600}
label:first-of-type{margin-top:0}
input[type="password"],input[type="text"]{width:100%;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:16px;background:#fff;color:var(--text);box-sizing:border-box}
input[type="password"]:focus,input[type="text"]:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px rgba(201,140,91,0.15)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:48px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:var(--copper);font-weight:700;padding:0}
.pw-toggle:hover{color:var(--copper-dark)}
.btn-reset{width:100%;height:48px;padding:0;border-radius:12px;border:1px solid transparent;background:var(--copper);color:#0b0a09;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 3px 10px rgba(201,140,91,.28);margin-top:20px}
.btn-reset:hover{background:var(--copper-dark);color:#fff}
.btn-reset:disabled{opacity:.7;cursor:not-allowed}
.msg{font-size:13px;margin-top:12px;min-height:20px}
.msg.error{color:#b91c1c;font-weight:600}
.msg.success{color:#16a34a;font-weight:600}
.expired-msg{text-align:center;padding:24px 0}
.expired-msg p{font-size:14px;color:#78716c;margin:0 0 16px}
.expired-msg a{color:var(--copper);text-decoration:none;font-weight:700;font-size:14px}
.expired-msg a:hover{text-decoration:underline}
</style>
</head>
<body data-page="reset-password">

<div id="header-placeholder"></div>

<div class="reset-wrap">
  <div class="reset-card">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password for your account</p>

    <!-- Shown when recovery token is valid -->
    <form id="resetForm" autocomplete="off" style="display:none;">
      <label for="newPassword">New password</label>
      <div class="pw-wrap">
        <input id="newPassword" type="password" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8"/>
        <button type="button" class="pw-toggle" id="pwToggle1">Show</button>
      </div>

      <label for="confirmPassword">Confirm new password</label>
      <div class="pw-wrap">
        <input id="confirmPassword" type="password" placeholder="Re-enter your password" required autocomplete="new-password"/>
        <button type="button" class="pw-toggle" id="pwToggle2">Show</button>
      </div>

      <button type="submit" class="btn-reset" id="submitBtn">Update Password</button>
      <div id="formMsg" class="msg"></div>
    </form>

    <!-- Shown when recovery token is invalid or expired -->
    <div id="expiredView" style="display:none;">
      <div class="expired-msg">
        <p>This reset link is invalid or has expired.</p>
        <a href="/forgot-password.html">Request a new reset link</a>
      </div>
    </div>

    <!-- Shown while waiting for auth state -->
    <div id="loadingView" style="text-align:center;padding:24px 0;">
      <p style="font-size:14px;color:#78716c;margin:0;">Verifying reset link...</p>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.2/dist/umd/supabase.min.js" integrity="sha384-zETTH+6IXxKQ6zbGcT6H6EDdnGaae9uhI8uO7doTJoNEmPGeTKVOe5S6/XybS9JH" crossorigin="anonymous"></script>
<script src="./search.js"></script>
<script>
fetch('./header.html').then(r=>r.text()).then(h=>{document.getElementById('header-placeholder').innerHTML=h});
fetch('./footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h});

const sb = getSb();

const resetForm = document.getElementById('resetForm');
const expiredView = document.getElementById('expiredView');
const loadingView = document.getElementById('loadingView');
let recoveryReady = false;

function showForm() {
  loadingView.style.display = 'none';
  expiredView.style.display = 'none';
  resetForm.style.display = 'block';
}

function showExpired() {
  loadingView.style.display = 'none';
  resetForm.style.display = 'none';
  expiredView.style.display = 'block';
}

// Listen for PASSWORD_RECOVERY event from Supabase
if (sb) {
  const { data: { subscription } } = sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
      showForm();
    }
  });

  // Timeout — if no recovery event fires within 3 seconds, link is invalid
  setTimeout(() => {
    if (!recoveryReady) {
      showExpired();
      subscription.unsubscribe();
    }
  }, 3000);
} else {
  showExpired();
}

// Password show/hide toggles
document.getElementById('pwToggle1').addEventListener('click', function() {
  const pw = document.getElementById('newPassword');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? 'Hide' : 'Show';
});
document.getElementById('pwToggle2').addEventListener('click', function() {
  const pw = document.getElementById('confirmPassword');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? 'Hide' : 'Show';
});

// Form submit
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (!newPassword || !confirmPassword) {
    msg.textContent = 'Please fill in both password fields.';
    msg.className = 'msg error';
    return;
  }

  if (newPassword.length < 8) {
    msg.textContent = 'Password must be at least 8 characters.';
    msg.className = 'msg error';
    return;
  }

  if (newPassword !== confirmPassword) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    return;
  }

  if (!sb) {
    msg.textContent = 'System loading — please refresh.';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';
  msg.textContent = '';
  msg.className = 'msg';

  const { error } = await sb.auth.updateUser({ password: newPassword });

  if (error) {
    msg.textContent = error.message || 'Failed to update password. Please try again.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Update Password';
    return;
  }

  msg.textContent = 'Password updated successfully!';
  msg.className = 'msg success';
  btn.disabled = true;
  btn.textContent = 'Password updated';

  setTimeout(() => {
    window.location.href = '/login.html';
  }, 2000);
});
</script>
<script src="/app.js"></script>
</body>
</html>
