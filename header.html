<style>
header {
  background: #0b0a09;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 50px;
  padding: 0 24px;
}

.logo-link {
  position: relative;
  overflow: hidden;
  display: block;
  flex-shrink: 0;
}

.logo-link::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
  animation: logoGlow 30s ease-in-out infinite;
  pointer-events: none;
}

@keyframes logoGlow {
  0% { left: -100%; }
  10% { left: 100%; }
  100% { left: 100%; }
}

#site-logo {
  height: 50px;
  display: block;
}

.nav {
  display: flex;
  gap: 32px;
  align-items: center;
}

.nav-btn {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.nav-btn:hover {
  color: #c98c5b;
  transform: scale(1.05);
}

.search-icon {
  width: 18px;
  height: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.search-icon:hover {
  transform: scale(1.1);
}

@media (max-width: 768px) {
  #site-logo {
    height: 40px;
  }
  
  .header-inner {
    height: 40px;
    padding: 0 16px;
  }
  
  .nav {
    flex-wrap: wrap;
    gap: 12px;
  }
  
  .nav-btn {
    font-size: 11px;
  }
  
  .search-icon {
    width: 16px;
    height: 16px;
  }
}
</style>

<header>
  <div class="header-inner">
    <a href="/" class="logo-link">
      <img id="site-logo" src="mainlogo.png?v=415" alt="EVTime">
    </a>
    
    <nav class="nav">
      <a href="./sell.html" class="nav-btn">Sell</a>
      <a href="./share.html" class="nav-btn">Inventory</a>
      <a href="./escrow.html" class="nav-btn">Escrow</a>
      <a href="./dmv.html" class="nav-btn">DMV</a>
      <a href="./about.html" class="nav-btn">About</a>
      <a href="./support.html" class="nav-btn">Support</a>
      <a href="#" class="nav-btn">Chat</a>
      <svg class="search-icon" onclick="typeof openSearch === 'function' && openSearch()" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">

        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
    </nav>
  </div>
</header>
