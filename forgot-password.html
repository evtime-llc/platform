<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.googletagmanager.com www.clarity.ms client.crisp.chat; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.supabase.co www.googletagmanager.com; connect-src 'self' *.supabase.co www.google-analytics.com region1.google-analytics.com *.clarity.ms client.crisp.chat wss://client.relay.crisp.chat; font-src 'self' client.crisp.chat; frame-src 'none';"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Forgot Password — E.V.Time</title>
<meta name="description" content="Reset your EVTime account password."/>
<meta name="theme-color" content="#0b0a09"/>
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>

<meta property="og:title" content="Forgot Password — E.V.Time"/>
<meta property="og:description" content="Reset your EVTime account password."/>
<meta property="og:image" content="https://itsevtime.com/og-card.png"/>
<meta property="og:url" content="https://itsevtime.com/forgot-password.html"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>

<link rel="stylesheet" href="./styles.css"/>

<style>
#header-placeholder{position:sticky;top:0;z-index:100}
.forgot-wrap{max-width:440px;margin:0 auto;padding:48px 16px 64px}
.forgot-card{background:var(--bg-light);border:1px solid var(--line);border-radius:14px;padding:32px 28px}
.forgot-card h1{margin:0 0 6px;font-size:24px;font-weight:900;color:var(--text);letter-spacing:-0.02em}
.forgot-card .subtitle{font-size:14px;color:#78716c;margin:0 0 24px}
label{display:block;font-size:13px;color:#44403c;margin:12px 0 4px;font-weight:600}
label:first-of-type{margin-top:0}
input[type="email"],input[type="text"]{width:100%;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:16px;background:#fff;color:var(--text);box-sizing:border-box}
input[type="email"]:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px rgba(201,140,91,0.15)}
.btn-reset{width:100%;height:48px;padding:0;border-radius:12px;border:1px solid transparent;background:var(--copper);color:#0b0a09;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 3px 10px rgba(201,140,91,.28);margin-top:20px}
.btn-reset:hover{background:var(--copper-dark);color:#fff}
.btn-reset:disabled{opacity:.7;cursor:not-allowed}
.msg{font-size:13px;margin-top:12px;min-height:20px}
.msg.error{color:#b91c1c;font-weight:600}
.msg.success{color:#16a34a;font-weight:600}
.back-link{display:block;text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-size:14px;color:#78716c}
.back-link a{color:var(--copper);text-decoration:none;font-weight:700}
.back-link a:hover{text-decoration:underline}
</style>
</head>
<body data-page="forgot-password">

<div id="header-placeholder"></div>

<div class="forgot-wrap">
  <div class="forgot-card">
    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link</p>

    <form id="forgotForm" autocomplete="on">
      <!-- Honeypot: hidden from real users, bots fill this in -->
      <div style="position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden;" aria-hidden="true">
        <label>Company</label>
        <input id="company" type="text" name="company" tabindex="-1" autocomplete="off">
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email"/>

      <button type="submit" class="btn-reset" id="submitBtn">Send Reset Link</button>
      <div id="formMsg" class="msg"></div>
    </form>

    <div class="back-link"><a href="/login.html">Back to Sign in</a></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.2/dist/umd/supabase.min.js" integrity="sha384-zETTH+6IXxKQ6zbGcT6H6EDdnGaae9uhI8uO7doTJoNEmPGeTKVOe5S6/XybS9JH" crossorigin="anonymous"></script>
<script src="./search.js"></script>
<script>
fetch('./header.html').then(r=>r.text()).then(h=>{document.getElementById('header-placeholder').innerHTML=h});
fetch('./footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h});

const sb = getSb();

// Redirect if already logged in
(async () => {
  if (!sb) return;
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/account.html';
})();

// Form submit
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  // Honeypot check
  if (document.getElementById('company').value) {
    msg.textContent = "If an account exists with this email, you'll receive a reset link shortly.";
    msg.className = 'msg success';
    return;
  }

  const email = document.getElementById('email').value.trim();

  if (!email) {
    msg.textContent = 'Please enter your email address.';
    msg.className = 'msg error';
    return;
  }

  if (!sb) {
    msg.textContent = 'System loading — please refresh.';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  msg.textContent = '';
  msg.className = 'msg';

  try {
    await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://itsevtime.com/reset-password.html'
    });
  } catch (_) {
    // Intentionally ignore — never reveal whether email exists
  }

  msg.textContent = "If an account exists with this email, you'll receive a reset link shortly.";
  msg.className = 'msg success';
  btn.disabled = true;
  btn.textContent = 'Email sent';
});
</script>
<script src="/app.js"></script>
</body>
</html>
