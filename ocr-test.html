<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EVTime OCR Test</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:0;background:#0b1325;color:#e5e7eb}
  .wrap{max-width:720px;margin:0 auto;padding:16px}
  .card{background:#111827;border:1px solid #233048;border-radius:14px;padding:16px}
  label{display:block;margin:10px 0 6px;color:#cbd5e1}
  input[type="text"],input[type="url"]{width:100%;height:42px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb;padding:0 12px}
  input[type="file"]{width:100%}
  button{height:44px;border-radius:12px;border:1px solid transparent;background:#c98c5b;color:#0b1325;font-weight:800;cursor:pointer;padding:0 16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .muted{color:#94a3b8;font-size:12px}
  img{max-width:100%;border-radius:10px;margin-top:10px}
  pre{white-space:pre-wrap;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;margin-top:10px;color:#d1d5db}
</style>
</head>
<body>
<div class="wrap">
  <h1 style="margin:10px 0 12px">EVTime OCR Test</h1>
  <div class="card">
    <label for="workerUrl">Worker URL</label>
    <input id="workerUrl" type="url" placeholder="https://evtime-ocr-proxy.YOURNAME.workers.dev">
    <div class="row">
      <label for="file" style="margin:0">VIN Photo</label>
     <input id="file" type="file" accept="image/*">
      <button id="scanBtn">Scan with Vision</button>
    </div>
    <div id="hint" class="muted" style="margin-top:8px">
      Tip: Fill the frame with the VIN line on the door-jamb label. Strong, even light. Avoid glare.
    </div>
    <img id="preview" alt="" hidden>
    <pre id="out" hidden></pre>
  </div>
</div>

<script>
const urlEl = document.getElementById('workerUrl');
const fileEl = document.getElementById('file');
const outEl = document.getElementById('out');
const prevEl = document.getElementById('preview');
const btn = document.getElementById('scanBtn');

urlEl.value = localStorage.getItem('workerUrl') || '';
urlEl.addEventListener('input', ()=> localStorage.setItem('workerUrl', urlEl.value.trim()));

btn.addEventListener('click', async ()=>{
  const wurl = (urlEl.value || '').trim().replace(/\/+$/,'');
  if(!/^https?:\/\//i.test(wurl)) return alert('Paste your Worker URL first.');
  const f = fileEl.files && fileEl.files[0];
  if(!f) return alert('Choose a VIN photo.');
  try{
    btn.disabled = true; btn.textContent = 'Scanning…';
    const dataURL = await resizeToDataURL(f, 1600, 0.82);
    prevEl.src = dataURL; prevEl.hidden = false;

    const res = await fetch(wurl + '/ocr', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image: dataURL })
    });
    const j = await res.json();
    outEl.hidden = false;
    outEl.textContent = JSON.stringify(j, null, 2);
    btn.textContent = 'Scan with Vision';
  }catch(e){
    outEl.hidden = false;
    outEl.textContent = 'Error: ' + (e && e.message || e);
    btn.textContent = 'Scan with Vision';
  }finally{
    btn.disabled = false;
  }
});

function resizeToDataURL(file, maxW=1600, quality=0.82){
  return new Promise((resolve,reject)=>{
    const fr = new FileReader();
    fr.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=> reject(new Error('Bad image'));
      img.src = fr.result;
    };
    fr.onerror = ()=> reject(new Error('Read error'));
    fr.readAsDataURL(file);
  });
}
</script>
</body>
</html>
