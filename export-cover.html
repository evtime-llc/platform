<!doctype html>
<meta charset="utf-8">
<title>Export EV TIME Cover</title>
<button id="dl">Download 1920×1080 PNG</button>
<script>
const SRC='cover.svg', W=1920, H=1080;
document.getElementById('dl').onclick = async () => {
  const svgText = await (await fetch(SRC, {cache:'no-store'})).text();
  const url = URL.createObjectURL(new Blob([svgText], {type:'image/svg+xml'}));
  const img = new Image(); img.onload = () => {
    const c = document.createElement('canvas'); c.width=W; c.height=H;
    const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,W,H);
    c.toBlob(b => { const a=document.createElement('a'); a.href=URL.createObjectURL(b);
      a.download='evtime-cover-1920x1080.png'; a.click(); }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
};
</script>
