<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EVTime — Leads Admin</title>
  <style>
    /* Top logo/header */
    .topbar { background:#fff; border-bottom:1px solid #e7e5e4; }
    .logo-wrap { max-width:880px; margin:0 auto; padding:0 12px; }
    #site-logo { display:block; width:100%; height:auto; max-height:200px; object-fit:contain; }
    @media (max-width:600px){ #site-logo { max-height:220px; } }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
      background:#fafafa;
    }
    h1 { margin-top:16px; }

    fieldset {
      border: 1px solid #ddd;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 8px;
      background:#fff;
    }
    legend { font-weight: 800; }
    label { display:block; margin: 8px 0 4px; font-weight: 600; }
    input, button, select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    input[type="email"] { width: 260px; max-width:100%; }
    button.btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 12px;
      border-radius:8px;
      border:1px solid #ddd;
      background:#fff;
      cursor:pointer;
      font-size:14px;
    }
    button.btn:disabled { opacity:.5; cursor:not-allowed; }

    .muted { color:#666; font-size:12px; }
    .ok { color:#0a7; }
    .err { color:#c00; white-space:pre-wrap; }
    .pill {
      display:inline-block;
      background:#f4f4f4;
      padding:4px 8px;
      border-radius:999px;
      margin-right:6px;
      font-size:12px;
    }

    /* Leads table */
    table { width:100%; border-collapse: collapse; margin-top:10px; font-size:13px; }
    th, td {
      padding:8px 6px;
      border-bottom:1px solid #eee;
      vertical-align: top;
    }
    th { text-align:left; color:#555; font-size:12px; text-transform:uppercase; letter-spacing:0.03em; }
    tr:nth-child(even) { background:#fcfcfc; }

    .lead-main { font-weight:700; font-size:13px; }
    .lead-sub { font-size:12px; color:#666; }
    .message { white-space:pre-wrap; font-size:12px; }
    .ai-notes { white-space:pre-wrap; font-size:12px; }

    .badge {
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      border:1px solid transparent;
    }
    .badge.ai-ok {
      background:#e6f7ef;
      color:#0a7;
      border-color:#bfead3;
    }
    .badge.ai-warning {
      background:#fff7e6;
      color:#b45309;
      border-color:#ffe5b4;
    }
    .badge.ai-null {
      background:#f4f4f5;
      color:#555;
      border-color:#e4e4e7;
    }

    .controls {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:8px;
      align-items:center;
    }
    .controls span.label-small { font-size:12px; color:#555; }

    .tiny { font-size:11px; color:#777; }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display:block; }
      thead { display:none; }
      tr { border:1px solid #eee; border-radius:8px; margin-bottom:10px; padding:8px; }
      td { border:none; padding:4px 0; }
      td[data-label]::before {
        content: attr(data-label) ": ";
        font-weight:700;
        display:inline-block;
        min-width:90px;
        font-size:11px;
        text-transform:uppercase;
        color:#555;
      }
    }
  </style>
</head>
<body>

  <!-- Topbar / Logo -->
  <div class="topbar">
    <div class="logo-wrap">
      <a href="/" aria-label="Go to Home">
        <img id="site-logo" src="mainlogo.svg?v=402" alt="EVTime Admin">
      </a>
    </div>
  </div>

  <h1>EVTime — Leads Admin</h1>

  <!-- Auth box -->
  <fieldset id="authBox">
    <legend>Authentication</legend>
    <div id="sessionInfo" class="muted">Checking session…</div>

    <div id="signinBox">
      <label for="email">Email for magic link</label>
      <input id="email" type="email" value="vahehr@gmail.com" required/>
      <button id="sendLink" class="btn">Send Magic Link</button>
      <div id="authMsg" class="muted" aria-live="polite"></div>
    </div>

    <button id="signout" class="btn" style="display:none">Sign out</button>
  </fieldset>

  <!-- Leads list -->
  <fieldset id="leadsBox" style="display:none">
    <legend>Leads + AI</legend>

    <div class="controls">
      <span class="label-small">Rows:</span>
      <select id="limitSelect">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
      </select>

      <span class="label-small">AI status:</span>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="ok">OK only</option>
        <option value="warning">Warnings only</option>
        <option value="null">No AI yet</option>
      </select>

      <span class="label-small">Quick search:</span>
      <input id="searchInput" type="text" placeholder="name / email / phone" style="flex:1; min-width:140px; max-width:260px;">

      <button id="refreshBtn" class="btn">Refresh</button>
    </div>

    <div class="tiny" id="summaryLine"></div>

    <div id="tblWrap">
      <table>
        <thead>
          <tr>
            <th>Created</th>
            <th>Contact</th>
            <th>Listing ID</th>
            <th>Message</th>
            <th>AI Status</th>
            <th>AI Notes</th>
          </tr>
        </thead>
        <tbody id="tblLeads"></tbody>
      </table>
      <div id="emptyMsg" class="muted" style="display:none">No leads found.</div>
    </div>
  </fieldset>

  <!-- Diagnostics -->
  <fieldset>
    <legend>Diagnostics</legend>
    <div id="diag"></div>
  </fieldset>

  <!-- Config + Supabase -->
  <script src="/config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // -------------------
    // Basic helpers
    // -------------------
    const SUPABASE_URL = (window.SUPABASE_URL || "https://tgkvhmxrftcegpryptwq.supabase.co").trim();
    const SUPABASE_ANON_KEY = (window.SUPABASE_ANON_KEY || "").trim();

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: 'pkce',
        storageKey: 'evtime-auth'
      }
    });

    const $ = (id) => document.getElementById(id);
    const diag = (m) => { const d = $("diag"); d.innerHTML += `<div>${m}</div>`; };
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const escAttr = esc;

    // -------------------
    // Auth UI
    // -------------------
    async function setSessionUI() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error) {
        diag(`<span class="err">getSession error: ${esc(error.message)}</span>`);
      }

      if (session) {
        const email = session.user?.email || "";
        if (email.toLowerCase() !== "vahehr@gmail.com") {
          $("sessionInfo").innerHTML = `<span class="err">Access denied for ${esc(email)}</span>`;
          await supabase.auth.signOut();
          $("signinBox").style.display = "block";
          $("signout").style.display = "none";
          $("leadsBox").style.display = "none";
          return;
        }
        $("sessionInfo").innerHTML = `<span class="ok">Signed in:</span> <span class="pill">${esc(email)}</span>`;
        $("signinBox").style.display = "none";
        $("signout").style.display = "inline-block";
        $("leadsBox").style.display = "block";
        await refreshLeads();
      } else {
        $("sessionInfo").textContent = "Not signed in.";
        $("signinBox").style.display = "block";
        $("signout").style.display = "none";
        $("leadsBox").style.display = "none";
      }
    }

    supabase.auth.onAuthStateChange((event) => {
      diag(`Auth event: ${esc(event)}`);
      setSessionUI();
    });

    $("sendLink").onclick = async () => {
      const email = $("email").value.trim();
      if (!email) {
        $("authMsg").textContent = "Enter your email first.";
        return;
      }
      $("authMsg").textContent = "Sending magic link...";
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: "https://itsevtime.com/admin-leads.html" }
      });
      $("authMsg").textContent = error ? `Error: ${error.message}` : "Check your email.";
    };

    $("signout").onclick = async () => {
      await supabase.auth.signOut();
      await setSessionUI();
    };

    (async () => {
      const qs = window.location.search;
      if (qs && qs.includes("code=")) {
        const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
        if (error) diag(`<span class="err">Auth exchange error: ${esc(error.message)}</span>`);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      await setSessionUI();
    })();

    // -------------------
    // Leads load + render
    // -------------------
    async function refreshLeads() {
      const limit = parseInt($("limitSelect").value || "100", 10);

      const { data, error } = await supabase
        .from("leads")
        .select("id,created_at,listing_id,name,email,phone,message,ai_notes,ai_status,ai_last_run")
        .order("created_at", { ascending:false })
        .limit(limit);

      if (error) {
        diag(`<span class="err">Load leads error: ${esc(error.message)}</span>`);
        $("tblLeads").innerHTML = "";
        $("emptyMsg").style.display = "block";
        $("summaryLine").textContent = "";
        return;
      }

      const rows = data || [];
      renderLeads(rows);
    }

    function renderLeads(rows) {
      const statusFilter = $("statusFilter").value;
      const search = $("searchInput").value.trim().toLowerCase();

      let filtered = rows.slice();

      if (statusFilter === "ok") {
        filtered = filtered.filter(r => (r.ai_status || "").toLowerCase() === "ok");
      } else if (statusFilter === "warning") {
        filtered = filtered.filter(r => (r.ai_status || "").toLowerCase() === "warning");
      } else if (statusFilter === "null") {
        filtered = filtered.filter(r => !r.ai_status && !r.ai_notes && !r.ai_last_run);
      }

      if (search) {
        filtered = filtered.filter(r => {
          const blob = [
            r.name || "",
            r.email || "",
            r.phone || "",
            r.message || ""
          ].join(" ").toLowerCase();
          return blob.includes(search);
        });
      }

      $("summaryLine").textContent = `Showing ${filtered.length} of ${rows.length} loaded leads.`;

      const tb = $("tblLeads");
      if (!filtered.length) {
        tb.innerHTML = "";
        $("emptyMsg").style.display = "block";
        return;
      }
      $("emptyMsg").style.display = "none";

      tb.innerHTML = filtered.map(r => {
        const created = r.created_at ? new Date(r.created_at).toLocaleString() : "";
        const lastRun = r.ai_last_run ? new Date(r.ai_last_run).toLocaleString() : "";
        const msg = r.message || "";
        const aiNotes = r.ai_notes || "";
        const aiStatusRaw = (r.ai_status || "").toLowerCase();
        let aiBadgeCls = "badge ai-null";
        let aiBadgeText = "PENDING";
        if (aiStatusRaw === "ok") {
          aiBadgeCls = "badge ai-ok";
          aiBadgeText = "OK";
        } else if (aiStatusRaw === "warning") {
          aiBadgeCls = "badge ai-warning";
          aiBadgeText = "WARNING";
        } else if (aiStatusRaw) {
          aiBadgeText = aiStatusRaw.toUpperCase();
        }

        return `
          <tr>
            <td data-label="Created">
              <div class="lead-sub">${esc(created)}</div>
              ${lastRun ? `<div class="tiny">AI last run: ${esc(lastRun)}</div>` : `<div class="tiny">AI last run: —</div>`}
            </td>
            <td data-label="Contact">
              <div class="lead-main">${esc(r.name || "(no name)")}</div>
              <div class="lead-sub">${esc(r.email || "")}</div>
              <div class="lead-sub">${esc(r.phone || "")}</div>
              <div class="tiny">Lead ID: <code>${esc(r.id)}</code></div>
            </td>
            <td data-label="Listing ID">
              <div class="lead-sub">${esc(r.listing_id || "")}</div>
            </td>
            <td data-label="Message">
              <div class="message">${esc(msg)}</div>
            </td>
            <td data-label="AI Status">
              <span class="${aiBadgeCls}">${esc(aiBadgeText)}</span>
            </td>
            <td data-label="AI Notes">
              <div class="ai-notes">${esc(aiNotes || "")}</div>
            </td>
          </tr>
        `;
      }).join("");
    }

    // -------------------
    // UI events
    // -------------------
    $("refreshBtn").onclick = () => { refreshLeads(); };
    $("limitSelect").onchange = () => { refreshLeads(); };
    $("statusFilter").onchange = () => { refreshLeads(); };

    let searchTimer = null;
    $("searchInput").addEventListener("input", () => {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { refreshLeads(); }, 300);
    });

    // Small read test
    (async () => {
      diag("Testing anon read from 'leads'…");
      const { error } = await supabase.from("leads").select("id").limit(1);
      if (error) diag(`<span class="err">Read error: ${esc(error.message)}</span>`); else diag("Read OK.");
    })();
  </script>
</body>
</html>
