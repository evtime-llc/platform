<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EVTime Admin — Leads</title>

  <style>
    .topbar { background:#fff; border-bottom:1px solid #e7e5e4; }
    .logo-wrap { max-width:880px; margin:0 auto; padding:0 12px; }
    #site-logo { display:block; width:100%; height:auto; max-height:200px; object-fit:contain; }

    body { font-family: system-ui; padding:24px; max-width:1000px; margin:0 auto; }
    fieldset { border:1px solid #ddd; padding:16px; margin-bottom:16px; border-radius:8px; }
    legend { font-weight:800; }
    .muted { color:#666; font-size:12px; }
    .ok { color:#0a7; }
    .err { color:#c00; white-space:pre-wrap; }
    .pill { background:#f4f4f4; padding:4px 8px; border-radius:999px; font-size:12px; }

    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid #eee; vertical-align:top; }
    th { font-size:13px; color:#555; }
    td .title { font-weight:800; }
    td .sub { font-size:12px; color:#666; }

    .badge { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:800; }
    .badge.ai-ok { background:#e6f7ef; color:#0a7; border:1px solid #bfead3; }
    .badge.ai-warning { background:#fff7e6; color:#b45309; border:1px solid #ffe5b4; }
    .badge.ai-pending { background:#eef2ff; color:#3730a3; border:1px solid #c7d2fe; }

    .tiny { font-size:11px; color:#666; }
    .diag-line { font-size:11px; }

    .admin-nav{
      margin:16px 0;
      display:flex;
      justify-content:center;
      gap:10px;
    }
    .nav-tab{
      padding:10px 24px;
      border-radius:999px;
      border:1px solid #c68a3a;
      background:#fff8ee;
      color:#8a5a1f;
      font-weight:800;
      text-decoration:none;
    }
    .nav-tab.active{
      background:#c68a3a;
      color:#fff;
      cursor:default;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo-wrap">
    <img id="site-logo" src="mainlogo.svg?v=402">
  </div>
</div>

<h1>EVTime — Admin</h1>

<div class="admin-nav">
  <a class="nav-tab" href="/admin.html">Inventory</a>
  <span class="nav-tab active">Leads</span>
</div>

<fieldset id="authBox">
  <legend>Authentication</legend>
  <div id="sessionInfo" class="muted">Checking session…</div>
  <div id="signinBox">
    <input id="email" type="email" value="vahehr@gmail.com"/>
    <button id="sendLink">Send Magic Link</button>
    <div id="authMsg" class="muted"></div>
  </div>
  <button id="signout" style="display:none">Sign out</button>
</fieldset>

<fieldset id="leadsBox" style="display:none">
  <legend>Leads</legend>
  <table>
    <thead>
      <tr>
        <th>Lead</th>
        <th>Contact</th>
        <th>Message</th>
        <th>AI</th>
        <th>Meta</th>
      </tr>
    </thead>
    <tbody id="leadsTbl"></tbody>
  </table>
  <div id="leadsEmpty" class="muted" style="display:none">No leads yet.</div>
</fieldset>

<fieldset>
  <legend>Diagnostics</legend>
  <div id="diag"></div>
</fieldset>

<script src="/config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_ANON_KEY,
  { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, storageKey:'evtime-auth' } }
);

const $ = id => document.getElementById(id);
const diag = m => $('diag').innerHTML += `<div class="diag-line">${m}</div>`;
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

supabase.auth.onAuthStateChange(()=>setSessionUI());

async function setSessionUI(){
  const { data:{session} } = await supabase.auth.getSession();
  if (!session) return;

  $('signinBox').style.display='none';
  $('signout').style.display='inline';
  $('leadsBox').style.display='block';
  refreshLeads();
}

$('sendLink').onclick = async ()=>{
  await supabase.auth.signInWithOtp({
    email:$('email').value,
    options:{ emailRedirectTo:'https://itsevtime.com/admin-leads.html' }
  });
};

$('signout').onclick = async ()=>{ await supabase.auth.signOut(); };

async function refreshLeads(){
  const { data } = await supabase
    .from('leads')
    .select('id,created_at,name,email,phone,message,ai_notes,ai_summary,ai_status,ai_last_run')
    .order('created_at',{ascending:false});

  if(!data?.length){ $('leadsEmpty').style.display='block'; return; }

  $('leadsTbl').innerHTML = data.map(r=>{
    const s = (r.ai_status||'').toLowerCase();

    let badgeClass='ai-pending', badgeLabel='PENDING';
    if(s==='ok'){ badgeClass='ai-ok'; badgeLabel='OK'; }
    else if(s==='warning'){ badgeClass='ai-warning'; badgeLabel='WARNING'; }
    else if(s==='error' || s==='failed'){
      badgeClass='ai-warning'; badgeLabel='ERROR';
    }

    return `
      <tr>
        <td><div class="title">${esc(r.name||'(no name)')}</div></td>
        <td class="sub">${esc(r.email||'')}</td>
        <td class="sub">${esc(r.message||'')}</td>
        <td>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          ${r.ai_notes ? `<div class="tiny">${esc(r.ai_notes)}</div>`:''}
          ${r.ai_summary ? `<div class="tiny"><b>Summary:</b> ${esc(r.ai_summary)}</div>`:''}
        </td>
        <td class="tiny">${new Date(r.created_at).toLocaleString()}</td>
      </tr>`;
  }).join('');
}

setInterval(()=>refreshLeads(),60000);
</script>
</body>
</html>
