<style>
#header-placeholder{position:sticky;top:0;z-index:100}
.wrap{max-width:880px;margin:0 auto;padding:12px}
.hero{padding:16px 12px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin:12px 0}
.hlite{background:linear-gradient(0deg, rgba(201,140,91,.08), rgba(201,140,91,.08));border:1px solid rgba(201,140,91,.55);box-shadow:0 6px 22px rgba(201,140,91,.25)}
h1{margin:6px 0 8px;font-size:24px}

p{margin:6px 0 8px}
.muted{color:#78716c}
.badge{display:inline-block;background:var(--copper-soft);border:1px solid var(--copper);color:var(--copper-dark);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-top:8px}

.btn.primary:hover{background:var(--copperDark);color:#fff}
.success{color:#16a34a;margin-top:8px;font-weight:700}
.error{color:#b91c1c;margin-top:8px;font-weight:700}

.faq-q{font-weight:700;color:#292524;margin-bottom:6px}
.faq-a{color:#57534e;font-size:14px}
.contact-methods{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
