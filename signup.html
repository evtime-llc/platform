<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.googletagmanager.com www.clarity.ms client.crisp.chat; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.supabase.co www.googletagmanager.com; connect-src 'self' *.supabase.co www.google-analytics.com region1.google-analytics.com *.clarity.ms client.crisp.chat wss://client.relay.crisp.chat; font-src 'self' client.crisp.chat; frame-src 'none';"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Create Account — E.V.Time</title>
<meta name="description" content="Create your EVTime account to buy or sell electric vehicles with confidence."/>
<meta name="theme-color" content="#0b0a09"/>
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>

<meta property="og:title" content="Create Account — E.V.Time"/>
<meta property="og:description" content="Create your EVTime account to buy or sell electric vehicles with confidence."/>
<meta property="og:image" content="https://itsevtime.com/og-card.png"/>
<meta property="og:url" content="https://itsevtime.com/signup.html"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>

<link rel="stylesheet" href="./styles.css"/>

<style>
#header-placeholder{position:sticky;top:0;z-index:100}
.signup-wrap{max-width:440px;margin:0 auto;padding:48px 16px 64px}
.signup-card{background:var(--bg-light);border:1px solid var(--line);border-radius:14px;padding:32px 28px}
.signup-card h1{margin:0 0 6px;font-size:24px;font-weight:900;color:var(--text);letter-spacing:-0.02em}
.signup-card .subtitle{font-size:14px;color:#78716c;margin:0 0 24px}
label{display:block;font-size:13px;color:#44403c;margin:12px 0 4px;font-weight:600}
label:first-of-type{margin-top:0}
input[type="email"],input[type="password"],input[type="text"]{width:100%;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:16px;background:#fff;color:var(--text);box-sizing:border-box}
input[type="email"]:focus,input[type="password"]:focus,input[type="text"]:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px rgba(201,140,91,0.15)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:48px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:var(--copper);font-weight:700;padding:0}
.pw-toggle:hover{color:var(--copper-dark)}
.role-label{margin:16px 0 8px}
.role-pills{display:flex;gap:8px}
.role-pill{flex:1;height:40px;border-radius:12px;border:1px solid var(--line);background:#fff;color:#44403c;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.role-pill:hover{border-color:var(--copper);color:var(--copper)}
.role-pill.active{background:var(--copper);color:#0b0a09;border-color:transparent;font-weight:800;box-shadow:0 2px 8px rgba(201,140,91,.25)}
.terms-row{display:flex;align-items:flex-start;gap:8px;margin:20px 0 20px}
.terms-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--copper);cursor:pointer;margin-top:2px;flex-shrink:0}
.terms-row label{margin:0;font-size:13px;font-weight:400;color:#44403c;cursor:pointer;line-height:1.5}
.terms-row a{color:var(--copper);text-decoration:none;font-weight:600}
.terms-row a:hover{text-decoration:underline}
.btn-signup{width:100%;height:48px;padding:0;border-radius:12px;border:1px solid transparent;background:var(--copper);color:#0b0a09;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 3px 10px rgba(201,140,91,.28)}
.btn-signup:hover{background:var(--copper-dark);color:#fff}
.btn-signup:disabled{opacity:.7;cursor:not-allowed}
.msg{font-size:13px;margin-top:12px;min-height:20px}
.msg.error{color:#b91c1c;font-weight:600}
.msg.success{color:#16a34a;font-weight:600}
.login-link{display:block;text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-size:14px;color:#78716c}
.login-link a{color:var(--copper);text-decoration:none;font-weight:700}
.login-link a:hover{text-decoration:underline}
</style>
</head>
<body data-page="signup">

<div id="header-placeholder"></div>

<div class="signup-wrap">
  <div class="signup-card">
    <h1>Create your account</h1>
    <p class="subtitle">Join EVTime — buy or sell with confidence</p>

    <form id="signupForm" autocomplete="on">
      <!-- Honeypot: hidden from real users, bots fill this in -->
      <div style="position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden;" aria-hidden="true">
        <label>Company</label>
        <input id="company" type="text" name="company" tabindex="-1" autocomplete="off">
      </div>

      <label for="fullName">Full name</label>
      <input id="fullName" type="text" placeholder="Your full name" required autocomplete="name"/>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email"/>

      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8"/>
        <button type="button" class="pw-toggle" id="pwToggle1">Show</button>
      </div>

      <label for="confirmPassword">Confirm password</label>
      <div class="pw-wrap">
        <input id="confirmPassword" type="password" placeholder="Re-enter your password" required autocomplete="new-password"/>
        <button type="button" class="pw-toggle" id="pwToggle2">Show</button>
      </div>

      <label class="role-label">I want to...</label>
      <div class="role-pills">
        <button type="button" class="role-pill active" data-role="buyer">Buy a vehicle</button>
        <button type="button" class="role-pill" data-role="seller">Sell a vehicle</button>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-signup" id="submitBtn">Create Account</button>
      <div id="formMsg" class="msg"></div>
    </form>

    <div class="login-link">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.2/dist/umd/supabase.min.js" integrity="sha384-zETTH+6IXxKQ6zbGcT6H6EDdnGaae9uhI8uO7doTJoNEmPGeTKVOe5S6/XybS9JH" crossorigin="anonymous"></script>
<script src="./search.js"></script>
<script>
fetch('./header.html').then(r=>r.text()).then(h=>{document.getElementById('header-placeholder').innerHTML=h});
fetch('./footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h});

const sb = getSb();

// Redirect if already logged in
(async () => {
  if (!sb) return;
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/account.html';
})();

// Password show/hide toggles
document.getElementById('pwToggle1').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? 'Hide' : 'Show';
});
document.getElementById('pwToggle2').addEventListener('click', function() {
  const pw = document.getElementById('confirmPassword');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? 'Hide' : 'Show';
});

// Role pill selection
const pills = document.querySelectorAll('.role-pill');
pills.forEach(pill => {
  pill.addEventListener('click', function() {
    this.classList.toggle('active');
    // Ensure at least one is selected
    const anyActive = document.querySelector('.role-pill.active');
    if (!anyActive) this.classList.add('active');
  });
});

function getSelectedRole() {
  const active = document.querySelectorAll('.role-pill.active');
  if (active.length === 2) return 'both';
  return active[0]?.dataset.role || 'buyer';
}

// Form submit
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  // Honeypot check
  if (document.getElementById('company').value) {
    msg.textContent = 'Account created! Check your email to confirm.';
    msg.className = 'msg success';
    return;
  }

  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const termsChecked = document.getElementById('terms').checked;

  if (!fullName || !email || !password || !confirmPassword) {
    msg.textContent = 'Please fill in all fields.';
    msg.className = 'msg error';
    return;
  }

  if (password.length < 8) {
    msg.textContent = 'Password must be at least 8 characters.';
    msg.className = 'msg error';
    return;
  }

  if (password !== confirmPassword) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    return;
  }

  if (!termsChecked) {
    msg.textContent = 'Please agree to the Terms of Service and Privacy Policy.';
    msg.className = 'msg error';
    return;
  }

  if (!sb) {
    msg.textContent = 'System loading — please refresh.';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  msg.textContent = '';
  msg.className = 'msg';

  const { error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        full_name: fullName,
        role: getSelectedRole()
      }
    }
  });

  if (error) {
    msg.textContent = error.message === 'User already registered'
      ? 'An account with this email already exists.'
      : 'Sign up failed. Please try again.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  msg.textContent = 'Check your email to confirm your account.';
  msg.className = 'msg success';
  btn.disabled = true;
  btn.textContent = 'Email sent';
});
</script>
<script src="/app.js"></script>
</body>
</html>
