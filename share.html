<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>it’s E.V.Time — Browse Inventory</title>
<meta name="theme-color" content="#0b0a09"/>

<meta property="og:title" content="it’s E.V.Time — Browse Inventory" />
<meta property="og:description" content="Teslas first, then other EVs, then Other Vehicles." />
<meta property="og:image" content="https://itsevtime.com/og-card.png" />
<meta property="og:url" content="https://itsevtime.com/share.html" />
<meta name="twitter:card" content="summary_large_image" />

<style>
:root{
  --bg:#0b0a09; --card:#ffffff; --text:#1c1917; --muted:#78716c; --line:#e7e5e4;
  --copper:#c98c5b; --copper-dark:#9e6d45; --copper-soft:#f5eae0; --cta:#c98c5b; --ctaText:#0b0a09;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}

/* Shared containers */
.wrap{max-width:880px;margin:0 auto;padding:12px}
.logo-wrap{max-width:880px;margin:0 auto;padding:0 12px}

/* Header / Logo */
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.logo-wrap a{display:block}
#site-logo{display:block;width:100%;height:auto;max-height:200px;object-fit:contain}
@media (max-width:600px){ #site-logo{max-height:220px} }

/* Button bar */
.buttonbar{padding:10px 0}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:46px;padding:0 16px;border-radius:14px;border:1px solid var(--line);
  background:#fff;color:var(--text);text-decoration:none;font-weight:700;transition:.15s ease
}
.btn.primary{
  background:var(--cta);color:var(--ctaText);border-color:transparent;
  box-shadow:0 4px 14px rgba(201,140,91,.35)
}
.btn.primary:hover{background:var(--copper-dark);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--copper);color:var(--copper)}
.btn.ghost:hover{background:var(--copper-soft)}
.btn:hover{transform:translateY(-1px)}

/* Inventory grid */
.inv-section{padding-top:8px}
.inv-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}

/* Card */
.inv-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;min-width:260px;max-width:320px;flex:1 1 280px;cursor:pointer;
}
.inv-photo{position:relative;aspect-ratio:4/3;overflow:hidden;background:#000}
.inv-photo img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.sold-badge{
  position:absolute;top:8px;left:8px;background:rgba(0,0,0,.75);color:#fff;font-weight:900;
  padding:4px 8px;border-radius:999px;font-size:12px;letter-spacing:.03em
}

/* In-card tiny gallery (optional) */
.gal-btn{
  position:absolute;top:50%;transform:translateY(-50%);border:none;background:rgba(0,0,0,.45);
  color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;line-height:36px;text-align:center;
}
.gal-btn:hover{background:rgba(0,0,0,.6)}
.gal-prev{left:8px}
.gal-next{right:8px}
.gal-dots{
  position:absolute;left:0;right:0;bottom:6px;display:flex;gap:6px;justify-content:center;align-items:center;
}
.gal-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35)}
.gal-dot.active{background:#fff}

.inv-body{padding:12px 12px 14px}
.inv-title{font-weight:900}
.inv-price{
  font-weight:900;color:#0b0a09;background:var(--copper);
  padding:2px 8px;border-radius:999px;white-space:nowrap
}
.inv-meta{margin-top:6px;color:#57534e;font-weight:700;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.inv-txt{margin-top:6px;font-size:13px}
.inv-vin{margin-top:6px;font-size:12px;color:#78716c}

/* Divider */
.divider-wrap{padding-top:20px}
.divider{
  display:flex;align-items:center;gap:10px;color:#fff;font-weight:900
}
.divider .line{height:1px;background:var(--line);flex:1}

/* Footer */
.footer{border-top:1px solid var(--line);background:#fff;margin-top:24px}
.footer .wrap{padding:16px 12px;color:#44403c;font-size:13px}
.footer a{color:#c98c5b;text-decoration:none;border-bottom:1px dotted var(--copper)}
.footer a:hover{border-bottom-style:solid}
.right{float:right}
.clearfix::after{content:"";display:block;clear:both}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:9999}
.lb.open{display:flex}
.lb-inner{position:relative;max-width:95vw;max-height:95vh}
.lb-img{max-width:95vw;max-height:95vh;object-fit:contain;background:#000;display:block}
.lb-close,.lb-prev,.lb-next{
  position:absolute;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:999px;
  width:40px;height:40px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)
}
.lb-close{top:-48px;right:0}
.lb-prev{left:-56px;top:50%;transform:translateY(-50%)}
.lb-next{right:-56px;top:50%;transform:translateY(-50%)}
@media (max-width:700px){
  .lb-prev{left:8px}.lb-next{right:8px}.lb-close{top:8px;right:8px}
}
.lb-dots{position:absolute;left:0;right:0;bottom:-28px;display:flex;gap:8px;justify-content:center}
.lb-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.35)}
.lb-dot.active{background:#fff}
</style>
</head>
<body>

<!-- Topbar / Logo -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="/" aria-label="Go to Home">
      <img id="site-logo" src="mainlogo.svg?v=402" alt="EVTime — Browse Inventory">
    </a>
  </div>
</div>

<!-- Buttons -->
<div class="logo-wrap buttonbar">
  <div class="row" role="navigation" aria-label="Primary actions">
    <a class="btn primary" href="./sell.html">Sell your car</a>
    <a class="btn ghost" href="./share.html">Browse inventory</a>
    <a class="btn ghost" href="./about.html">How it works / Why E.V.Time</a>
  </div>
</div>

<!-- Inventory mount -->
<div class="wrap" id="inventory"></div>

<footer class="footer">
  <div class="wrap clearfix">
    <div>© <span id="yr"></span> E.V.Time</div>
    <div class="right"><a href="./legal.html">Legal &amp; Disclosures</a></div>
  </div>
</footer>

<!-- Lightbox -->
<div class="lb" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lb-inner">
    <img id="lbImg" class="lb-img" alt="">
    <button id="lbPrev" class="lb-prev" aria-label="Previous image">‹</button>
    <button id="lbNext" class="lb-next" aria-label="Next image">›</button>
    <button id="lbClose" class="lb-close" aria-label="Close">✕</button>
    <div id="lbDots" class="lb-dots"></div>
  </div>
</div>

<!-- Config + Supabase client -->
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(async () => {
  const SUPABASE_URL = (window.SUPABASE_URL || "https://tgkvhmxrftcegpryptwq.supabase.co").trim();
  const SUPABASE_ANON_KEY = (window.SUPABASE_ANON_KEY || "").trim();
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // -------- Helpers
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function parseImages(images){
    if (!images) return [];
    if (Array.isArray(images)) return images;
    if (typeof images === 'string'){
      const s = images.trim();
      if (s.startsWith('[')) { try{ return JSON.parse(s)||[] } catch { return [] } }
      return s.split(',').map(v=>v.trim()).filter(Boolean);
    }
    return [];
  }
  function normalize(path){
    return String(path||'').trim().replace(/^\/+/, '').replace(/^(images\/)+/i,'');
  }
  function publicImageUrls(path){
    let s = String(path||'').trim().replace(/^\/+/, '');
    if (!s) return [];
    const candidates = [];
    if (/^images\/images\//i.test(s)) candidates.push(s.replace(/^images\/images\//i,'images/'));
    candidates.push(s);
    candidates.push(s.replace(/^images\//i,''));
    if (!/^images\//i.test(s)) candidates.push('images/' + s);
    const uniq = [...new Set(candidates)];
    return uniq.map(p => supabase.storage.from('images').getPublicUrl(p).data?.publicUrl || null).filter(Boolean);
  }
  function chooseUrl(path){
    const urls = publicImageUrls(path);
    return { url: urls[0] || null, alts: urls.slice(1) };
  }
  function preload(urls){
    urls.forEach(u => { const im = new Image(); im.decoding = 'async'; im.loading = 'eager'; im.src = u; });
  }
  window.__imgFallback = function(img){
    try{
      const alts = JSON.parse(img.getAttribute('data-alts') || '[]');
      if (alts.length){
        const next = alts.shift();
        img.setAttribute('data-alts', JSON.stringify(alts));
        img.src = next;
      } else { img.onerror = null; }
    }catch{ img.onerror = null; }
  };

  // -------- Block + order (mirror admin)
  function blockKey(row){
    const status = String(row.status||'').toLowerCase();
    if (status === 'sold') return 'sold';
    const vt = String(row.vehicle_type || 'ev').toLowerCase();
    const make = String(row.make || '').trim().toLowerCase(); // trim to avoid " Tesla"
    if (vt === 'ev'){
      if (make === 'tesla') return 'live_tesla';
      return 'live_other_ev';
    }
    return 'live_other';
  }

  // -------- Card HTML (whole card opens lightbox)
  function cardHTML(item, index){
    const {
      id, year, make, model, trim, mileage, special_features,
      title_status, condition, description, city, vin, price, images, status
    } = item;

    const paths = parseImages(images).map(normalize);
    const primaryUrls = paths.map(p => chooseUrl(p).url).filter(Boolean);
    const firstUrl = primaryUrls[0] || "og-card.png";
    const firstAlts = paths[0] ? publicImageUrls(paths[0]).slice(1) : [];

    // preload only first couple to keep page snappy
    preload(primaryUrls.slice(0,2));

    const title = [year, make, model, trim].filter(Boolean).join(" ");
    const leftMeta = [
      mileage ? `${Number(mileage).toLocaleString()} mi` : null,
      title_status ? `Title: ${title_status}` : null,
      condition ? `Cond: ${condition}` : null
    ].filter(Boolean).join(" • ");
    const priceText = (price != null && price !== "") ? `$${Number(price).toLocaleString()}` : "";
    const cityText = city ? esc(city) : "";
    const dots = primaryUrls.map((_,i)=>`<div class="gal-dot${i===0?' active':''}" data-dot="${i}"></div>`).join("");
    const soldBadge = String(status||'').toLowerCase()==='sold' ? `<div class="sold-badge">SOLD</div>` : '';

    // smarter loading: eager for first 3 cards, lazy for rest
    const loading = index < 3 ? 'eager' : 'lazy';

    return `
      <div class="inv-card" data-id="${esc(id)}" data-card="${index}"
           data-paths='${JSON.stringify(paths).replace(/"/g,'&quot;')}'
           data-idx="0">
        <div class="inv-photo">
          ${soldBadge}
          <img src="${esc(firstUrl)}" alt="${esc(title)}" loading="${loading}" decoding="async"
               data-alts='${JSON.stringify(firstAlts).replace(/"/g,'&quot;')}'
               onerror="window.__imgFallback && window.__imgFallback(this)">
          ${primaryUrls.length>1 ? `
            <button class="gal-btn gal-prev" data-action="prev" aria-label="Previous photo">‹</button>
            <button class="gal-btn gal-next" data-action="next" aria-label="Next photo">›</button>
            <div class="gal-dots">${dots}</div>
          `:``}
        </div>
        <div class="inv-body">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
            <div class="inv-title">${esc(title)}</div>
            ${priceText ? `<div class="inv-price">${esc(priceText)}</div>` : ``}
          </div>
          <div class="inv-meta">
            <span>${esc(leftMeta)}</span>
            <span>${esc(cityText)}</span>
          </div>
          ${special_features ? `<div class="inv-txt">${esc(special_features)}</div>` : ""}
          ${description ? `<div class="inv-txt" style="color:#44403c;">${esc(description)}</div>` : ""}
          ${vin ? `<div class="inv-vin">VIN: ${esc(vin)}</div>` : ""}
        </div>
      </div>
    `;
  }

  const renderSection = (items) => items.length ? `<div class="inv-section"><div class="inv-row">${items.map(cardHTML).join("")}</div></div>` : "";
  const dividerHTML = (text) => `
    <div class="divider-wrap">
      <div class="divider">
        <div class="line"></div>
        <div>${esc(text)}</div>
        <div class="line"></div>
      </div>
    </div>
  `;

  const mount = document.getElementById('inventory');

  // -------- Fetch ordered from server, then group
  async function fetchOrdered(statusVal){
    return supabase
      .from('listing')
      .select('id,year,make,model,trim,mileage,special_features,title_status,condition,description,city,vin,price,images,status,vehicle_type,position,updated_at,created_at')
      .eq('status', statusVal)
      .order('position', { ascending:false, nullsFirst:false })
      .order('updated_at', { ascending:false, nullsFirst:false })
      .limit(1000);
  }

  const [liveRes, soldRes] = await Promise.all([fetchOrdered('live'), fetchOrdered('sold')]);
  if (liveRes.error || soldRes.error){
    console.error(liveRes.error || soldRes.error);
    mount.innerHTML = `<div style="color:#fff">Error loading inventory.</div>`;
    return;
  }
  const live = liveRes.data || [];
  const sold = soldRes.data || [];

  // Now split LIVE by Tesla EV / other EV / other vehicles
  const live_tesla = [];
  const live_other_ev = [];
  const live_other = [];
  for (const r of live){
    const k = blockKey(r);
    if (k === 'live_tesla') live_tesla.push(r);
    else if (k === 'live_other_ev') live_other_ev.push(r);
    else live_other.push(r);
  }

  // Build HTML in admin’s block order
  let html = '';
  if (live_tesla.length) html += renderSection(live_tesla);
  if (live_other_ev.length) html += renderSection(live_other_ev);
  if (live_other.length) {
    html += dividerHTML('Other vehicles');
    html += renderSection(live_other);
  }
  if (sold.length) {
    html += dividerHTML('Sold');
    html += renderSection(sold);
  }
  mount.innerHTML = html || `<div style="color:#fff">No vehicles available right now.</div>`;

  // -------- In-card mini gallery + Lightbox
  mount.addEventListener('click', (e)=>{
    const btn = e.target.closest('.gal-btn');
    const dot = e.target.closest('.gal-dot');
    const card = e.target.closest('.inv-card');
    if (!card) return;

    // arrows / dots switching inside card
    if (btn || dot){
      const img = card.querySelector('.inv-photo img');
      const dots = [...card.querySelectorAll('.gal-dot')];
      const paths = JSON.parse(card.getAttribute('data-paths') || '[]');
      if (!paths.length) return;
      let idx = Number(card.getAttribute('data-idx') || 0);

      if (btn){
        const dir = btn.dataset.action === 'next' ? 1 : -1;
        idx = (idx + dir + paths.length) % paths.length;
      }
      if (dot){
        idx = Number(dot.dataset.dot);
      }

      const choice = chooseUrl(paths[idx]);
      img.src = choice.url || 'og-card.png';
      img.setAttribute('data-alts', JSON.stringify(choice.alts));
      card.setAttribute('data-idx', String(idx));
      dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
      return;
    }

    // whole card opens lightbox
    const paths = JSON.parse(card.getAttribute('data-paths') || '[]');
    const startIdx = Number(card.getAttribute('data-idx') || 0);
    if (paths.length) openLightbox(paths, startIdx);
  });

  // Lightbox
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbDots = document.getElementById('lbDots');
  const lbPrev = document.getElementById('lbPrev');
  const lbNext = document.getElementById('lbNext');
  const lbClose = document.getElementById('lbClose');

  let LB_PATHS = [];
  let LB_IDX = 0;

  function renderLbDots(){
    lbDots.innerHTML = LB_PATHS.map((_,i)=>`<div class="lb-dot${i===LB_IDX?' active':''}" data-i="${i}"></div>`).join('');
  }
  function showLb(idx){
    if (!LB_PATHS.length) return;
    LB_IDX = (idx + LB_PATHS.length) % LB_PATHS.length;
    const choice = chooseUrl(LB_PATHS[LB_IDX]);
    lbImg.src = choice.url || 'og-card.png';
    lbImg.setAttribute('data-alts', JSON.stringify(choice.alts || []));
    renderLbDots();
    // preload neighbors
    const n1 = chooseUrl(LB_PATHS[(LB_IDX+1)%LB_PATHS.length]).url;
    const n2 = chooseUrl(LB_PATHS[(LB_IDX-1+LB_PATHS.length)%LB_PATHS.length]).url;
    preload([n1,n2].filter(Boolean));
  }
  function openLightbox(paths, startIdx){
    LB_PATHS = paths.slice();
    LB_IDX = startIdx||0;
    lb.classList.add('open');
    showLb(LB_IDX);
  }
  function closeLightbox(){
    lb.classList.remove('open');
    LB_PATHS = []; LB_IDX = 0;
    lbImg.removeAttribute('src');
  }

  lbPrev.onclick = ()=> showLb(LB_IDX - 1);
  lbNext.onclick = ()=> showLb(LB_IDX + 1);
  lbClose.onclick = ()=> closeLightbox();
  lb.addEventListener('click', (e)=>{ if (e.target === lb) closeLightbox(); });
  lbDots.addEventListener('click', (e)=>{
    const dot = e.target.closest('.lb-dot');
    if (!dot) return;
    const i = Number(dot.getAttribute('data-i')||0);
    showLb(i);
  });
  document.addEventListener('keydown', (e)=>{
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') showLb(LB_IDX+1);
    if (e.key === 'ArrowLeft') showLb(LB_IDX-1);
  });
  // swipe
  let touchX=null,touchY=null;
  lb.addEventListener('touchstart',(e)=>{ const t=e.touches[0]; touchX=t.clientX; touchY=t.clientY; },{passive:true});
  lb.addEventListener('touchend',(e)=>{
    if (touchX==null) return;
    const dx = (e.changedTouches[0].clientX - touchX);
    const dy = (e.changedTouches[0].clientY - touchY);
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
      if (dx < 0) showLb(LB_IDX+1); else showLb(LB_IDX-1);
    }
    touchX=null; touchY=null;
  },{passive:true});

  // Footer year
  document.getElementById('yr').textContent = new Date().getFullYear();
})();
</script>
</body>
</html>
