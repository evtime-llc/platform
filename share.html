<style>
#header-placeholder { position: sticky; top: 0; z-index: 100; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
.card { background: var(--bg-light); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin: 12px 0; }
.list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 18px; margin: 18px 0; }
.card-img { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #f5f0e8; border-radius: 8px; }
.card-title { font-size: 18px; font-weight: 600; margin: 12px 0 6px; }
.card-meta { font-size: 14px; color: var(--text-muted); margin: 4px 0; }
.card-price { font-size: 20px; font-weight: 700; color: var(--text); margin: 8px 0; }
.card-btn { display: inline-block; background: var(--copper); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 8px; }
.card-btn:hover { opacity: 0.9; }
.divider { font-size: 22px; font-weight: 700; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--copper); }
.sold-badge { display: inline-block; background: #666; color: #fff; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-left: 8px; }
</style>
</head>
<body data-page="share">

<div id="header-placeholder"></div>

<div class="wrap">
  <div id="mount"></div>
</div>

<div id="footer-placeholder"></div>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./search.js"></script>
<script>
const url = window.SUPABASE_URL || 'https://tgkvhmxrftcegpryptwq.supabase.co';
const anonKey = window.SUPABASE_ANON_KEY || '';
const sb = supabase.createClient(url, anonKey);

const esc = s => {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
};

const parseImages = (raw) => {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') {
    try { return JSON.parse(raw); } catch { return []; }
  }
  return [];
};

const normalize = p => (p && p.startsWith('/')) ? p.substring(1) : (p || '');

const publicImageUrls = (images) => {
  if (!images || images.length === 0) return [];
  return images.map(p => {
    if (p.startsWith('http')) return p;
    const clean = normalize(p);
    return `${url}/storage/v1/object/public/images/${clean}`;
  });
};

const chooseUrl = (images) => {
  const urls = publicImageUrls(parseImages(images));
  return urls.length > 0 ? urls[0] : 'https://itsevtime.com/og-card.png';
};

const cardHTML = (item) => {
  const img = chooseUrl(item.images);
  const title = [item.year, item.make, item.model, item.trim].filter(Boolean).join(' ');
  const leftMeta = [
    item.mileage ? `${item.mileage.toLocaleString()} mi` : '',
    item.title_status ? `Title: ${item.title_status}` : '',
    item.condition ? `Cond: ${item.condition}` : ''
  ].filter(Boolean).join(' • ');
  const price = item.price ? `$${item.price.toLocaleString()}` : 'Contact';
  const soldBadge = item.status === 'sold' ? '<span class="sold-badge">SOLD</span>' : '';
  
  return `
    <div class="card">
      <img src="${esc(img)}" alt="${esc(title)}" class="card-img"/>
      <div class="card-title">${esc(title)} ${soldBadge}</div>
      <div class="card-meta">${esc(leftMeta)}</div>
      <div class="card-price">${esc(price)}</div>
      <a href="./listing.html?id=${item.id}" class="card-btn">View details</a>
    </div>
  `;
};

const isElectric = (item) => {
  const make = (item.make || '').toLowerCase();
  const vtype = (item.vehicle_type || '').toLowerCase();
  const model = (item.model || '').toLowerCase();
  
  if (make === 'tesla') return true;
  if (vtype.includes('ev') || vtype.includes('electric')) return true;
  if (model.includes('model 3') || model.includes('model s') || 
      model.includes('model x') || model.includes('model y')) return true;
  return false;
};

const fetchOrdered = async (statusVal) => {
  const { data, error } = await sb
    .from('listing')
    .select('id, year, make, model, trim, mileage, title_status, condition, price, images, status, vehicle_type, position, updated_at, created_at')
    .eq('status', statusVal)
    .order('position', { ascending: false })
    .order('updated_at', { ascending: false })
    .limit(1000);
  if (error) { console.error(error); return []; }
  return data || [];
};

(async () => {
  const live = await fetchOrdered('live');
  const sold = await fetchOrdered('sold');
  
  const electric = live.filter(isElectric);
  const other = live.filter(i => !isElectric(i));
  
  let html = '';
  
  if (electric.length > 0) {
    html += '<div class="divider">Electric Vehicles</div><div class="list">';
    electric.forEach(item => { html += cardHTML(item); });
    html += '</div>';
  }
  
  if (other.length > 0) {
    html += '<div class="divider">Other Vehicles</div><div class="list">';
    other.forEach(item => { html += cardHTML(item); });
    html += '</div>';
  }
  
  if (sold.length > 0) {
    html += '<div class="divider">Sold</div><div class="list">';
    sold.forEach(item => { html += cardHTML(item); });
    html += '</div>';
  }
  
  if (html === '') {
    html = '<div class="card">No vehicles available at the moment.</div>';
  }
  
  document.getElementById('mount').innerHTML = html;
})();

// Load header/footer
fetch('./header.html').then(r => r.text()).then(h => { document.getElementById('header-placeholder').innerHTML = h; });
fetch('./footer.html').then(r => r.text()).then(f => { document.getElementById('footer-placeholder').innerHTML = f; });
</script>
<script src="/app.js"></script>
</body>
</html>
