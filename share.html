<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Current Inventory</title>
<meta name="theme-color" content="#C98C5B"/>

<!-- Social preview (unchanged) -->
<meta property="og:title" content="EVTime — Used Tesla Inventory" />
<meta property="og:description" content="Tap to view today’s cars — photos, price, mileage." />
<meta property="og:image" content="https://vahehr-dotcom.github.io/Tesla_Inventory/og-card-red-diagonal-lights-v2.png?v=1" />
<meta property="og:url" content="https://itsevtime.com/share.html" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="stylesheet" href="./theme.css?v=1"/>

<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}

/* Page width */
.wrap{max-width:820px;margin:0 auto;padding:12px}

/* Top bar (clickable logo) */
.topbar{background:transparent;border-bottom:1px solid var(--line);margin:0;padding:0}
.logo-wrap{max-width:820px;margin:0 auto;padding:12px}
#site-logo{display:block;width:100%;height:auto;max-height:120px;object-fit:contain}

/* Footer */
.legal{border-top:1px solid var(--line);color:var(--muted);background:transparent}
.legal .wrap{padding:16px 12px;font-size:12px;line-height:1.5}
.legal a{color:var(--text);text-decoration:none}
.legal a:hover{text-decoration:underline}

/* Big centered CTA */
.ctaSell{padding:12px}
.ctaSell .pill{
  display:block;width:100%;text-align:center;background:var(--cta);color:var(--ctaText);
  font-weight:800;font-size:18px;border-radius:14px;padding:14px 16px;line-height:1.2;border:0;
  text-decoration:none; letter-spacing:.2px; -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 10px rgba(0,0,0,.25);
}
.ctaSell .pill:active{transform:scale(0.99)}

/* Inventory list */
.list{display:grid;grid-template-columns:1fr;gap:12px;padding:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer}
.photo{width:100%;aspect-ratio:4/3;background:#0b0f18}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.info{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px}
.row{display:flex;justify-content:space-between;gap:10px;white-space:nowrap;overflow:hidden}
.title{font-weight:600;overflow:hidden;text-overflow:ellipsis}
.muted{color:var(--muted);font-size:12px}
.price{font-weight:700}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:10px}
.modal.open{display:flex}
.sheet{width:100%;max-width:680px;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.sheet header{position:sticky;top:0;border-bottom:1px solid var(--line);background:var(--card);z-index:2;color:var(--text)}
.sheet .hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
.close{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:10px;height:34px;padding:0 10px;cursor:pointer}

/* Carousel */
.carousel{position:relative;background:#000}
.track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth}
.slide{flex:0 0 100%;scroll-snap-align:center;background:#000}
.slide img{display:block;width:100%;height:320px;object-fit:contain;background:#000}
.dots{display:flex;gap:6px;justify-content:center;padding:8px;background:var(--card);border-top:1px solid var(--line)}
.dot{width:8px;height:8px;border-radius:50%;background:#3a3f4a;cursor:pointer}
.dot.active{background:var(--cta)}
.controls{position:absolute;top:50%;left:0;right:0;display:flex;justify-content:space-between;transform:translateY(-50%);pointer-events:none}
.controls button{pointer-events:auto;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;width:34px;height:34px;opacity:.9}

/* Sheet body */
.body{padding:12px;display:grid;gap:8px;color:var(--text)}
.spec{display:flex;justify-content:space-between;gap:10px}
.actions{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}
.actions .cta{grid-column:1 / -1;height:48px;border-radius:12px;background:var(--cta);color:var(--ctaText);border:1px solid transparent;font-weight:700;font-size:16px}
.actions button{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:10px;height:38px;padding:0 12px}
</style>
</head>

<body>

<!-- Logo -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="./index.html" aria-label="Go to home">
      <img id="site-logo" src="mainlogo.svg?v=111" alt="it's E.V.Time — Forum and MarketPlace">
    </a>
  </div>
</div>

<!-- Big centered CTA -->
<div class="wrap ctaSell">
  <a class="pill" href="./sell.html">Sell Your Car — Get an Offer</a>
</div>

<main>
  <div class="wrap">
    <div id="status" class="muted">Loading…</div>
    <div id="list" class="list" hidden></div>
  </div>
</main>

<!-- Modal -->
<div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Vehicle details">
  <div class="sheet">
    <header><div class="hd">
      <div id="mTitle" style="font-weight:600">Car</div>
      <button class="close" id="mClose">Close</button>
    </div></header>
    <div class="carousel">
      <div class="track" id="track"></div>
      <div class="controls"><button id="prev">‹</button><button id="next">›</button></div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="body">
      <div class="spec"><div id="mMiles" class="muted"></div><div id="mPrice" class="price"></div></div>
      <div id="mNotes" class="muted" style="white-space:pre-wrap"></div>
      <div class="actions">
        <button id="smsBtn" class="cta">Contact us</button>
        <button id="shareCar">Share car</button>
        <button id="copyLink">Copy link</button>
      </div>
    </div>
  </div>
</div>

<footer class="legal">
  <div class="wrap">
    <div><strong>Disclosure:</strong> Retail transactions are completed by our licensed partner, Waltons Auto Sales. Private-party transactions are between individual buyer and seller. We are not affiliated with Tesla, Inc.</div>
    <div style="margin-top:6px">© <span id="yr"></span> E.V.Time · <a href="./legal.html">Legal</a></div>
  </div>
</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const statusEl=document.getElementById('status'), list=document.getElementById('list');

const modal=document.getElementById('modal'), mTitle=document.getElementById('mTitle'), mMiles=document.getElementById('mMiles'), mPrice=document.getElementById('mPrice'), mNotes=document.getElementById('mNotes');
const track=document.getElementById('track'), dots=document.getElementById('dots'), prev=document.getElementById('prev'), next=document.getElementById('next');
const shareCar=document.getElementById('shareCar'), copyLink=document.getElementById('copyLink'), smsBtn=document.getElementById('smsBtn');
const mClose=document.getElementById('mClose');

const fmtPrice=n=>{try{return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}catch{return'$'+(n||0)}};
const fmtMiles=n=>{try{return new Intl.NumberFormat('en-US').format(n)+' mi'}catch{return(n||0)+' mi'}};
const placeholder=()=>'data:image/svg+xml;charset=utf-8,'+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600'><rect width='800' height='600' fill='#0b0f18'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#475569' font-family='system-ui' font-size='28'>Photo</text></svg>");

let DATA=[], current=null, idx=0;

function ensureIds(arr){
  return (arr||[]).map(c=>{
    if(!c.id){
      c.id = (Math.random().toString(36)+Math.random().toString(36)).replace(/[^a-z0-9]/g,'').slice(2,10);
    }
    return c;
  });
}

function render(cars){
  list.innerHTML='';
  if(!Array.isArray(cars)||!cars.length){ statusEl.textContent='No inventory yet.'; return; }
  statusEl.hidden=true; list.hidden=false;
  cars.sort((a,b)=> (a.order??1e9)-(b.order??1e9) || (a.addedAt||0)-(b.addedAt||0) || (a.year||0)-(b.year||0));

  for(const c of cars){
    const card=document.createElement('div'); card.className='card';
    const ph=document.createElement('div'); ph.className='photo';
    const img=document.createElement('img'); img.loading='lazy'; img.decoding='async';
    img.src=(c.photos&&c.photos[0])||c.photo||placeholder(); img.alt=(c.model||'Car')+' photo'; ph.appendChild(img);
    const info=document.createElement('div'); info.className='info';
    const r1=document.createElement('div'); r1.className='row';
    const t=document.createElement('div'); t.className='title'; t.textContent=`${c.year||''} ${c.model||''} ${c.trim||''}`.replace(/\s+/g,' ').trim();
    const miles=document.createElement('div'); miles.className='muted'; miles.textContent=fmtMiles(c.mileage||0);
    r1.appendChild(t); r1.appendChild(miles);
    const r2=document.createElement('div'); r2.className='row';
    r2.innerHTML=`<b class="price">${fmtPrice(c.price||0)}</b><span class="muted">${c.addedAt? new Date(c.addedAt).toLocaleDateString():''}</span>`;
    info.appendChild(r1); info.appendChild(r2);
    card.appendChild(ph); card.appendChild(info); list.appendChild(card);
    card.addEventListener('click', ()=> openModal(c.id));
  }
}

function openModal(id){
  current = DATA.find(x=>x.id===id); if(!current) return;
  mTitle.textContent = `${current.year||''} ${current.model||''} ${current.trim||''}`.replace(/\s+/g,' ').trim();
  mMiles.textContent = fmtMiles(current.mileage||0);
  mPrice.textContent = fmtPrice(current.price||0);
  mNotes.textContent = current.notes||'';
  const imgs = (current.photos && current.photos.length? current.photos : (current.photo?[current.photo]:[]));
  buildCarousel(imgs.length? imgs : [placeholder()]);
  const deep = new URL(location.href); deep.hash = 'car=' + current.id; history.replaceState(null,'',deep);
  modal.classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ modal.classList.remove('open'); document.body.style.overflow=''; const u=new URL(location.href); u.hash=''; history.replaceState(null,'',u); }

function buildCarousel(arr){
  track.innerHTML=''; dots.innerHTML=''; idx=0;
  arr.forEach((src,i)=>{
    const sl=document.createElement('div'); sl.className='slide';
    const im=document.createElement('img'); im.src=src; im.alt='photo '+(i+1); sl.appendChild(im); track.appendChild(sl);
    const dot=document.createElement('div'); dot.className='dot'+(i===0?' active':''); dot.addEventListener('click',()=>go(i)); dots.appendChild(dot);
  });
  prev.onclick=()=>go(idx-1); next.onclick=()=>go(idx+1);
  track.addEventListener('scroll', onScrollSync, {passive:true});
}
function go(i){ const slides=[...track.children]; if(!slides.length) return; idx=(i+slides.length)%slides.length; slides[idx].scrollIntoView({behavior:'smooth'}); syncDots(); }
function onScrollSync(){ const slides=[...track.children]; const x=track.scrollLeft, w=track.clientWidth; const i=Math.round(x/w); if(i!==idx){ idx=i; syncDots(); } }
function syncDots(){ [...dots.children].forEach((d,j)=> d.classList.toggle('active', j===idx)); }

function carLink(id){ const u=new URL(location.href); u.hash='car='+id; return u.href; }
shareCar.addEventListener('click', async ()=>{ if(!current) return; const url=carLink(current.id); const title=mTitle.textContent;
  const text = `${title} — ${fmtPrice(current.price||0)}\n${fmtMiles(current.mileage||0)}\n${url}`;
  try{ if(navigator.share){ await navigator.share({title, text, url}); } else throw 0; }catch{ await copyText(url); alert('Link copied:\n'+url); }});
copyLink.addEventListener('click', async ()=>{ if(!current) return; const url=carLink(current.id); await copyText(url); alert('Link copied:\n'+url); });

document.getElementById('smsBtn').addEventListener('click', ()=>{
  if(!current) return;
  const model = current.model || 'your vehicle';
  const price = fmtPrice(current.price||0);
  const msg = `Hello, I'm interested in your ${model} for ${price} please contact me.`;
  const body = encodeURIComponent(msg);
  const num = "+14248660109".replace(/[^0-9+]/g,'');
  location.href = `sms:${num}?&body=${body}`;
});

async function copyText(t){ if(navigator.clipboard && window.isSecureContext){ return navigator.clipboard.writeText(t) }
  const el=document.createElement('textarea'); el.value=t; document.body.appendChild(el); el.select(); document.execCommand('copy'); el.remove(); }

/* Load inventory */
fetch('./inventory.json?ts='+Date.now(), {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d=>{
    DATA = ensureIds(Array.isArray(d)? d : []); render(DATA);
    const m = new URL(location.href).hash.match(/car=([A-Za-z0-9_-]+)/); if(m){ openModal(m[1]); }
  })
  .catch(err=>{ statusEl.innerHTML="Viewer error. Check <code>inventory.json</code> exists.<br>"+(err.message||err) });

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal() });
mClose.addEventListener('click', closeModal);
</script>
</body>
</html>
