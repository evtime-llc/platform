<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>EVTime — Inventory</title>
  <style>
    :root { --card: #fff; --muted:#666; --border:#e5e5e5; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin:0; background:#fafafa; color:#111; }
    header { padding:16px 20px; border-bottom:1px solid var(--border); background:#fff; position:sticky; top:0; }
    h1 { margin:0; font-size:20px; }
    main { max-width:1100px; margin: 20px auto; padding: 0 16px; }
    #status { color: var(--muted); font-size: 12px; margin: 8px 0 16px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
    .imgwrap { width:100%; aspect-ratio: 4/3; background:#f2f2f2; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .imgwrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .content { padding:12px; }
    .title { font-weight:700; margin:0 0 6px; }
    .meta { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .price { font-weight:700; }
    .badge { font-size:11px; padding:2px 6px; border-radius:999px; background:#eef2ff; color:#3730a3; margin-left:6px; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>EVTime — Inventory</h1>
  </header>
  <main>
    <div id="status" class="muted">Loading…</div>
    <div id="grid" class="grid"></div>
  </main>

  <!-- Load Supabase config + client -->
  <script src="/config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // 1) Supabase client
    const SUPABASE_URL = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const fmtPrice = (n) => (n && !isNaN(n)) ? '$' + Number(n).toLocaleString() : '';

    // 2) Build a public URL for a stored path
    function imageUrlFromPath(path) {
      if (!path) return null;
      // path is stored relative to the bucket root (e.g. "63bae9.../file.jpg")
      // Some older rows might include "images/…" prefix; both are OK.
      const { data } = supabase.storage.from('images').getPublicUrl(path);
      return data?.publicUrl || null;
    }

    // 3) Normalize the images field (array or JSON string -> array of paths)
    function normalizeImagesField(imagesField) {
      if (!imagesField) return [];
      if (Array.isArray(imagesField)) return imagesField;
      if (typeof imagesField === 'string') {
        try {
          const parsed = JSON.parse(imagesField);
          return Array.isArray(parsed) ? parsed : [];
        } catch { return []; }
      }
      return [];
    }

    // 4) Render cards
    function render(rows) {
      const grid = $('grid');
      grid.innerHTML = '';
      if (!rows?.length) {
        $('status').textContent = 'No vehicles yet.';
        return;
      }
      $('status').textContent = `${rows.length} vehicle${rows.length>1?'s':''}`;

      rows.forEach(row => {
        const paths = normalizeImagesField(row.images);
        const first = paths[0] || null;
        const imgUrl = imageUrlFromPath(first);

        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="imgwrap">
            ${imgUrl ? `<img src="${imgUrl}" alt="${row.year||''} ${row.make||''} ${row.model||''}"/>` : `<span class="muted">No image</span>`}
          </div>
          <div class="content">
            <div class="title">${row.year||''} ${row.make||''} ${row.model||''}${row.trim?(' ' + row.trim):''}
              ${row.status ? `<span class="badge">${row.status}</span>` : ''}
            </div>
            <div class="meta">${row.powertrain||''}${row.powertrain && row.mileage ? ' • ' : ''}${row.mileage ? (Number(row.mileage).toLocaleString() + ' mi') : ''}${row.city ? ' • ' + row.city : ''}</div>
            <div class="price">${fmtPrice(row.price)}</div>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    // 5) Fetch latest listed cars
    (async () => {
      try {
        // Public read is allowed by your RLS policy; no auth required
        const { data, error } = await supabase
          .from('listing')
          .select('id, year, make, model, trim, mileage, powertrain, city, price, status, images')
          .order('created_at', { ascending: false })
          .limit(24);

        if (error) {
          $('status').textContent = 'Error loading inventory';
          console.error(error);
          return;
        }
        render(data);
      } catch (e) {
        $('status').textContent = 'Error loading inventory';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
