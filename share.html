<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>it’s E.V.Time — Browse Inventory</title>
<meta name="theme-color" content="#0b0a09"/>

<meta property="og:title" content="it’s E.V.Time — Browse Inventory" />
<meta property="og:description" content="Teslas first, then other EVs, then Other Vehicles." />
<meta property="og:image" content="https://itsevtime.com/og-card.png" />
<meta property="og:url" content="https://itsevtime.com/share.html" />
<meta name="twitter:card" content="summary_large_image" />

<style>
:root{
  --bg:#0b0a09; --card:#ffffff; --text:#1c1917; --muted:#78716c; --line:#e7e5e4;
  --copper:#c98c5b; --copper-dark:#9e6d45; --copper-soft:#f5eae0; --cta:#c98c5b; --ctaText:#0b0a09;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}

/* Shared containers */
.wrap{max-width:880px;margin:0 auto;padding:12px}
.logo-wrap{max-width:880px;margin:0 auto;padding:0 12px}

/* Header / Logo */
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.logo-wrap a{display:block}
#site-logo{display:block;width:100%;height:auto;max-height:200px;object-fit:contain}
@media (max-width:600px){ #site-logo{max-height:220px} }

/* Button bar */
.buttonbar{padding:10px 0}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:46px;padding:0 16px;border-radius:14px;border:1px solid var(--line);
  background:#fff;color:var(--text);text-decoration:none;font-weight:700;transition:.15s ease
}
.btn.primary{
  background:var(--cta);color:var(--ctaText);border-color:transparent;
  box-shadow:0 4px 14px rgba(201,140,91,.35)
}
.btn.primary:hover{background:var(--copper-dark);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--copper);color:var(--copper)}
.btn.ghost:hover{background:var(--copper-soft)}
.btn:hover{transform:translateY(-1px)}

/* Inventory grid */
.inv-section{padding-top:8px}
.inv-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}

/* Card */
.inv-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;min-width:260px;max-width:320px;flex:1 1 280px;
  cursor:pointer; position:relative;
}
.inv-photo{position:relative;aspect-ratio:4/3;overflow:hidden;background:#000}
.inv-photo img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.sold-badge{
  position:absolute;top:8px;left:8px;background:rgba(0,0,0,.75);color:#fff;font-weight:900;
  padding:4px 8px;border-radius:999px;font-size:12px;letter-spacing:.03em
}

/* Full-card clickable overlay */
.card-hit{
  position:absolute; inset:0; z-index:5;
  text-indent:-9999px; /* accessible but invisible */
}

/* In-card body */
.inv-body{padding:12px 12px 14px}
.inv-title{font-weight:900}
.inv-price{
  font-weight:900;color:#0b0a09;background:var(--copper);
  padding:2px 8px;border-radius:999px;white-space:nowrap
}
.inv-meta{margin-top:6px;color:#57534e;font-weight:700;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.inv-txt{margin-top:6px;font-size:13px}
.inv-vin{margin-top:6px;font-size:12px;color:#78716c}

/* Divider */
.divider-wrap{padding-top:20px}
.divider{
  display:flex;align-items:center;gap:10px;color:#fff;font-weight:900
}
.divider .line{height:1px;background:var(--line);flex:1}

/* Footer */
.footer{border-top:1px solid var(--line);background:#fff;margin-top:24px}
.footer .wrap{padding:16px 12px;color:#44403c;font-size:13px}
.footer a{color:#c98c5b;text-decoration:none;border-bottom:1px dotted var(--copper)}
.footer a:hover{border-bottom-style:solid}
.right{float:right}
.clearfix::after{content:"";display:block;clear:both}
</style>
</head>
<body>

<!-- Topbar / Logo -->
<div class="topbar">
  <div class="logo-wrap">
    <a href="/" aria-label="Go to Home">
      <img id="site-logo" src="mainlogo.svg?v=402" alt="EVTime — Browse Inventory">
    </a>
  </div>
</div>

<!-- Buttons -->
<div class="logo-wrap buttonbar">
  <div class="row" role="navigation" aria-label="Primary actions">
    <a class="btn primary" href="./sell.html">Sell your car</a>
    <a class="btn ghost" href="./share.html">Browse inventory</a>
    <a class="btn ghost" href="./about.html">How it works / Why E.V.Time</a>
  </div>
</div>

<!-- Inventory mount -->
<div class="wrap" id="inventory"></div>

<footer class="footer">
  <div class="wrap clearfix">
    <div>© <span id="yr"></span> E.V.Time</div>
    <div class="right"><a href="./legal.html">Legal &amp; Disclosures</a></div>
  </div>
</footer>

<!-- Config + Supabase client -->
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(async () => {
  const SUPABASE_URL = (window.SUPABASE_URL || "https://tgkvhmxrftcegpryptwq.supabase.co").trim();
  const SUPABASE_ANON_KEY = (window.SUPABASE_ANON_KEY || "").trim();
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // -------- Helpers
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function parseImages(images){
    if (!images) return [];
    if (Array.isArray(images)) return images;
    if (typeof images === 'string'){
      const s = images.trim();
      if (s.startsWith('[')) { try{ return JSON.parse(s)||[] } catch { return [] } }
      return s.split(',').map(v=>v.trim()).filter(Boolean);
    }
    return [];
  }
  function normalize(path){
    return String(path||'').trim().replace(/^\/+/, '').replace(/^(images\/)+/i,'');
  }
  function publicImageUrls(path){
    let s = String(path||'').trim().replace(/^\/+/, '');
    if (!s) return [];
    const candidates = [];
    if (/^images\/images\//i.test(s)) candidates.push(s.replace(/^images\/images\//i,'images/'));
    candidates.push(s);
    candidates.push(s.replace(/^images\//i,''));
    if (!/^images\//i.test(s)) candidates.push('images/' + s);
    const uniq = [...new Set(candidates)];
    return uniq.map(p => supabase.storage.from('images').getPublicUrl(p).data?.publicUrl || null).filter(Boolean);
  }
  function chooseUrl(path){
    const urls = publicImageUrls(path);
    return { url: urls[0] || null, alts: urls.slice(1) };
  }

  // -------- Block + order (mirror admin)
  function blockKey(row){
    const status = String(row.status||'').toLowerCase();
    if (status === 'sold') return 'sold';
    const vt = String(row.vehicle_type || 'ev').toLowerCase();
    const make = String(row.make || '').trim().toLowerCase();
    if (vt === 'ev'){
      if (make === 'tesla') return 'live_tesla';
      return 'live_other_ev';
    }
    return 'live_other';
  }

  // -------- Card HTML (whole card navigates via overlay)
  function cardHTML(item){
    const {
      id, year, make, model, trim, mileage, special_features,
      title_status, condition, description, city, vin, price, images, status
    } = item;

    const paths = parseImages(images).map(normalize);
    const firstUrl = (paths.length ? chooseUrl(paths[0]).url : null) || "og-card.png";

    const title = [year, make, model, trim].filter(Boolean).join(" ");
    const leftMeta = [
      mileage ? `${Number(mileage).toLocaleString()} mi` : null,
      title_status ? `Title: ${title_status}` : null,
      condition ? `Cond: ${condition}` : null
    ].filter(Boolean).join(" • ");
    const priceText = (price != null && price !== "") ? `$${Number(price).toLocaleString()}` : "";
    const cityText = city ? esc(city) : "";
    const soldBadge = String(status||'').toLowerCase()==='sold' ? `<div class="sold-badge">SOLD</div>` : '';

    return `
      <div class="inv-card" data-id="${esc(id)}">
        <a class="card-hit" href="./listing.html?id=${esc(id)}" aria-label="View details">View details</a>
        <div class="inv-photo">
          ${soldBadge}
          <img src="${esc(firstUrl)}" alt="${esc(title)}" loading="lazy" decoding="async">
        </div>
        <div class="inv-body">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
            <div class="inv-title">${esc(title)}</div>
            ${priceText ? `<div class="inv-price">${esc(priceText)}</div>` : ``}
          </div>
          <div class="inv-meta">
            <span>${esc(leftMeta)}</span>
            <span>${esc(cityText)}</span>
          </div>
          ${special_features ? `<div class="inv-txt">${esc(special_features)}</div>` : ""}
          ${description ? `<div class="inv-txt" style="color:#44403c;">${esc(description)}</div>` : ""}
          ${vin ? `<div class="inv-vin">VIN: ${esc(vin)}</div>` : ""}
          <div class="inv-txt" style="margin-top:10px;">
            <a class="btn" style="height:38px;padding:0 12px;border-radius:10px;border:1px solid var(--line);text-decoration:none;font-weight:800;"
               href="./listing.html?id=${esc(id)}">View details</a>
          </div>
        </div>
      </div>
    `;
  }

  const renderSection = (items) => items.length ? `<div class="inv-section"><div class="inv-row">${items.map(cardHTML).join("")}</div></div>` : "";
  const dividerHTML = (text) => `
    <div class="divider-wrap">
      <div class="divider">
        <div class="line"></div>
        <div>${esc(text)}</div>
        <div class="line"></div>
      </div>
    </div>
  `;

  const mount = document.getElementById('inventory');

  // -------- Fetch ordered from server, then group
  async function fetchOrdered(statusVal){
    return supabase
      .from('listing')
      .select('id,year,make,model,trim,mileage,special_features,title_status,condition,description,city,vin,price,images,status,vehicle_type,position,updated_at,created_at')
      .eq('status', statusVal)
      .order('position', { ascending:false, nullsFirst:false })
      .order('updated_at', { ascending:false, nullsFirst:false })
      .limit(1000);
  }

  const [liveRes, soldRes] = await Promise.all([fetchOrdered('live'), fetchOrdered('sold')]);
  if (liveRes.error || soldRes.error){
    console.error(liveRes.error || soldRes.error);
    mount.innerHTML = `<div style="color:#fff">Error loading inventory.</div>`;
    return;
  }
  const live = liveRes.data || [];
  const sold = soldRes.data || [];

  // Split LIVE by Tesla EV / other EV / other vehicles
  const live_tesla = [], live_other_ev = [], live_other = [];
  for (const r of live){
    const k = blockKey(r);
    if (k === 'live_tesla') live_tesla.push(r);
    else if (k === 'live_other_ev') live_other_ev.push(r);
    else live_other.push(r);
  }

  // Build HTML in admin’s block order
  let html = '';
  if (live_tesla.length) html += renderSection(live_tesla);
  if (live_other_ev.length) html += renderSection(live_other_ev);
  if (live_other.length) {
    html += dividerHTML('Other vehicles');
    html += renderSection(live_other);
  }
  if (sold.length) {
    html += dividerHTML('Sold');
    html += renderSection(sold);
  }
  mount.innerHTML = html || `<div style="color:#fff">No vehicles available right now.</div>`;

  // Footer year
  document.getElementById('yr').textContent = new Date().getFullYear();
})();
</script>
</body>
</html>
