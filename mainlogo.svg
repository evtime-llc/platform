<!-- mainlogo.svg — Folded Ribbon Monogram (v3) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 220" width="1600" height="220">
  <defs>
    <style>.txt{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}</style>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A7F3D0"/><stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Taller plate (light) with indigo border -->
  <rect x="120" y="24" width="1360" height="176" rx="28"
        fill="#F3F7FA" stroke="#1E40AF" stroke-width="9" filter="url(#shadow)"/>

  <!-- Folded EV badge (mint + indigo) -->
  <g transform="translate(200,60)">
    <path d="M0,0 L64,0 L48,24 L24,24 L0,0 Z" fill="url(#mint)"/>
    <path d="M0,0 L0,80 L64,80 L64,56 L24,56 L24,24" fill="url(#mint)"/>
    <path d="M84,0 L132,0 L168,36 L132,72 L84,72 L120,36 Z" fill="#1E40AF" opacity=".95"/>
  </g>

  <!-- Wordmark (top line) -->
  <text class="txt" x="420" y="120" font-size="56" fill="#0B1325">it’s</text>
  <text class="txt" x="520" y="130" font-size="120" font-weight="900" fill="#0B1325"
        textLength="740" lengthAdjust="spacing">E.V.Time</text>

  <!-- Tagline (same exact width & start as “E.V.Time”) -->
  <text class="txt" x="520" y="172" font-size="42" fill="#64748b"
        textLength="740" lengthAdjust="spacing">Forum and MarketPlace</text>
</svg>
