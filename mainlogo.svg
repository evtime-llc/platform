<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <!-- Black background -->
  <rect width="1000" height="400" fill="#0b0a09"/>
  
  <!-- Car silhouette in copper #c98c5b -->
  <g stroke="#c98c5b" stroke-width="3" fill="none">
    <!-- Car outline - sleek sedan profile -->
    <path d="M 150 220 Q 180 180 250 170 L 350 170 Q 380 165 420 180 L 650 180 Q 720 175 780 190 Q 820 200 850 220 L 870 240 Q 875 250 875 260 L 875 280 Q 870 290 860 295 L 820 295 Q 810 310 790 310 Q 770 310 760 295 L 240 295 Q 230 310 210 310 Q 190 310 180 295 L 140 295 Q 130 290 125 280 L 125 240 Q 130 225 150 220 Z"/>
    
    <!-- Windshield -->
    <path d="M 280 170 L 320 140 L 580 140 L 620 170"/>
    
    <!-- Side windows -->
    <line x1="330" y1="145" x2="450" y2="145" stroke-width="2"/>
    <line x1="480" y1="145" x2="570" y2="145" stroke-width="2"/>
    
    <!-- Door line -->
    <line x1="450" y1="180" x2="450" y2="270" stroke-width="2"/>
  </g>
  
  <!-- "EV Time" text in white -->
  <text x="500" y="340" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="600" fill="#ffffff" text-anchor="middle">EV Time</text>
</svg>
